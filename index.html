<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Technical Assessment</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0F0E0C;
    --ink-2: #18161B;
    --paper: #E8DDC4;
    --paper-dim: #B8AE96;
    --paper-mute: #8A8270;
    --rule: #2A2620;
    --accent: #D4A647;
    --accent-dim: #8C6E2C;
    --correct: #6FAE5C;
    --wrong: #C46856;
    --serif: "Fraunces", Georgia, serif;
    --sans: "Inter", system-ui, sans-serif;
    --mono: "JetBrains Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--ink); color: var(--paper); font-family: var(--sans); }
  body {
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(212,166,71,.04), transparent 40%),
      radial-gradient(circle at 80% 90%, rgba(212,166,71,.03), transparent 50%);
  }
  .progress-bar {
    position: fixed; top: 0; left: 0; right: 0; height: 2px;
    background: var(--rule); z-index: 100;
  }
  .progress-fill {
    height: 100%; background: var(--accent);
    transition: width .4s cubic-bezier(.4, 0, .2, 1);
  }
  .stage {
    max-width: 760px; margin: 0 auto; padding: 88px 32px 120px;
    min-height: 100vh; display: flex; flex-direction: column; justify-content: center;
  }
  .eyebrow {
    font-family: var(--mono); font-size: 11px; letter-spacing: .14em;
    text-transform: uppercase; color: var(--paper-mute); margin-bottom: 18px;
  }
  .eyebrow .dot { color: var(--accent); }
  h1 {
    font-family: var(--serif); font-weight: 400; font-size: clamp(36px, 6vw, 56px);
    line-height: 1.05; margin: 0 0 20px; letter-spacing: -.01em;
  }
  h1 em { font-style: italic; color: var(--accent); font-weight: 400; }
  .lede {
    font-family: var(--serif); font-style: italic; font-size: 19px;
    color: var(--paper-dim); line-height: 1.55; margin: 0 0 36px; max-width: 560px;
  }
  .meta {
    display: flex; gap: 32px; flex-wrap: wrap;
    border-top: 1px solid var(--rule); padding-top: 24px;
    font-family: var(--mono); font-size: 12px; color: var(--paper-mute);
  }
  .meta-item .k { display: block; text-transform: uppercase; letter-spacing: .12em; font-size: 10px; margin-bottom: 4px; }
  .meta-item .v { color: var(--paper); font-size: 13px; }
  .btn {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--accent); color: var(--ink);
    border: none; padding: 14px 24px; font-family: var(--sans); font-weight: 600;
    font-size: 14px; letter-spacing: .02em; cursor: pointer;
    transition: transform .2s, background .2s;
  }
  .btn:hover { background: var(--paper); transform: translateY(-1px); }
  .btn.ghost {
    background: transparent; color: var(--paper);
    border: 1px solid var(--rule);
  }
  .btn.ghost:hover { background: var(--ink-2); border-color: var(--paper-mute); transform: none; }
  .btn:disabled { opacity: .4; cursor: not-allowed; transform: none !important; }
  .cta-row { margin-top: 40px; display: flex; gap: 12px; align-items: center; }

  /* Question screen */
  .q-section {
    font-family: var(--mono); font-size: 11px; letter-spacing: .14em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 14px;
  }
  .q-counter {
    font-family: var(--mono); font-size: 11px; color: var(--paper-mute);
    letter-spacing: .12em;
  }
  .q-header {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 28px;
  }
  .q-text {
    font-family: var(--serif); font-size: clamp(22px, 3vw, 30px);
    line-height: 1.3; font-weight: 400; margin: 0 0 8px;
  }
  .q-code {
    font-family: var(--mono); font-size: 13px; background: var(--ink-2);
    border-left: 2px solid var(--accent-dim); padding: 16px 20px;
    margin: 24px 0 32px; color: var(--paper); white-space: pre;
    overflow-x: auto; line-height: 1.6;
  }
  .options { display: flex; flex-direction: column; gap: 10px; margin-top: 32px; }
  .option {
    background: var(--ink-2); border: 1px solid var(--rule);
    padding: 16px 20px; cursor: pointer; text-align: left;
    font-family: var(--sans); font-size: 15px; color: var(--paper);
    transition: border-color .15s, background .15s, transform .1s;
    display: flex; gap: 14px; align-items: flex-start; line-height: 1.5;
  }
  .option:hover { border-color: var(--paper-mute); background: #1f1c20; }
  .option .letter {
    font-family: var(--mono); font-size: 12px; color: var(--paper-mute);
    flex-shrink: 0; margin-top: 2px; min-width: 18px;
  }
  .option.selected { border-color: var(--accent); }
  .option.correct { border-color: var(--correct); background: rgba(111, 174, 92, .08); }
  .option.correct .letter { color: var(--correct); }
  .option.wrong { border-color: var(--wrong); background: rgba(196, 104, 86, .08); }
  .option.wrong .letter { color: var(--wrong); }
  .option:disabled { cursor: default; }

  .explanation {
    margin-top: 28px; padding: 22px 24px; background: var(--ink-2);
    border-left: 2px solid var(--accent); font-family: var(--serif);
    font-size: 16px; line-height: 1.6; color: var(--paper-dim);
    animation: fadeIn .4s ease-out;
  }
  .explanation strong { color: var(--accent); font-weight: 600; font-style: normal; }
  .explanation code {
    font-family: var(--mono); font-size: 13px; background: var(--ink);
    padding: 2px 6px; color: var(--paper); font-style: normal;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  .nav-row {
    margin-top: 40px; display: flex; justify-content: space-between; align-items: center;
    padding-top: 28px; border-top: 1px solid var(--rule);
  }

  /* Result screen */
  .score-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
    margin: 36px 0 40px;
  }
  .score-card {
    background: var(--ink-2); border: 1px solid var(--rule);
    padding: 22px;
  }
  .score-card .label {
    font-family: var(--mono); font-size: 10px; letter-spacing: .14em;
    text-transform: uppercase; color: var(--paper-mute); margin-bottom: 10px;
  }
  .score-card .value {
    font-family: var(--serif); font-size: 40px; color: var(--paper); line-height: 1;
  }
  .score-card .value .total { font-size: 18px; color: var(--paper-mute); }
  .score-card .bar {
    margin-top: 14px; height: 3px; background: var(--rule); position: relative; overflow: hidden;
  }
  .score-card .bar span {
    position: absolute; left: 0; top: 0; bottom: 0; background: var(--accent);
  }
  .verdict {
    background: var(--ink-2); padding: 28px; border-left: 2px solid var(--accent);
    font-family: var(--serif); font-style: italic; font-size: 17px;
    color: var(--paper-dim); line-height: 1.6; margin-bottom: 36px;
  }
  .verdict strong { color: var(--accent); font-style: normal; }
  .review-list {
    display: flex; flex-direction: column; gap: 18px; margin-top: 28px;
  }
  .review-item {
    padding: 18px 22px; background: var(--ink-2); border-left: 2px solid var(--rule);
  }
  .review-item.wrong { border-left-color: var(--wrong); }
  .review-item.right { border-left-color: var(--correct); }
  .review-item .num {
    font-family: var(--mono); font-size: 11px; color: var(--paper-mute);
    letter-spacing: .12em; margin-bottom: 8px;
  }
  .review-item .q { font-family: var(--serif); font-size: 16px; margin-bottom: 6px; }
  .review-item .a { font-family: var(--mono); font-size: 12px; color: var(--paper-mute); }
  .review-item .a span.given { color: var(--wrong); }
  .review-item .a span.right { color: var(--correct); }
  .section-title {
    font-family: var(--mono); font-size: 11px; letter-spacing: .14em;
    text-transform: uppercase; color: var(--paper-mute);
    border-top: 1px solid var(--rule); padding-top: 24px; margin-top: 48px;
  }

  @media (max-width: 600px) {
    .stage { padding: 64px 20px 80px; }
    .score-grid { grid-template-columns: 1fr; }
    .meta { gap: 18px; }
  }
</style>
</head>
<body>
  <div class="progress-bar"><div class="progress-fill" id="progress" style="width:0%"></div></div>
  <div id="app" class="stage"></div>

<script>
const QUESTIONS = [
  // --- JavaScript / TypeScript ---
  {
    section: "JavaScript & TypeScript",
    q: "What does this log?",
    code: "for (var i = 0; i < 3; i++) {\n  setTimeout(() => console.log(i), 0);\n}",
    options: [
      "0 1 2",
      "3 3 3",
      "undefined undefined undefined",
      "ReferenceError"
    ],
    correct: 1,
    explanation: "<strong>var</strong> is function-scoped, so all three callbacks share the same <code>i</code>. By the time the timeouts fire, the loop has finished and <code>i === 3</code>. Replace <code>var</code> with <code>let</code> to get <code>0 1 2</code> — <code>let</code> creates a new binding per iteration."
  },
  {
    section: "JavaScript & TypeScript",
    q: "Which TypeScript construct supports declaration merging?",
    options: [
      "type only",
      "interface only",
      "Both type and interface",
      "Neither — you must extend explicitly"
    ],
    correct: 1,
    explanation: "Only <strong>interface</strong> supports declaration merging — declaring the same interface name twice merges the members. <code>type</code> aliases throw a duplicate identifier error. This is why library augmentation (e.g., extending Express's <code>Request</code>) uses interfaces."
  },
  {
    section: "JavaScript & TypeScript",
    q: "What's wrong with this code if you need each request to complete before the next?",
    code: "[url1, url2, url3].forEach(async (url) => {\n  await fetch(url);\n});\nconsole.log('done');",
    options: [
      "Nothing — forEach awaits each callback",
      "forEach doesn't await async callbacks — requests run in parallel and 'done' logs immediately",
      "It throws because async functions can't be used in forEach",
      "It works but logs 'done' three times"
    ],
    correct: 1,
    explanation: "<strong>Array.prototype.forEach ignores the returned Promise.</strong> All three fetches fire concurrently and <code>'done'</code> logs before any of them resolve. Use <code>for...of</code> with <code>await</code> for sequential, or <code>Promise.all(urls.map(fetch))</code> for parallel-with-wait."
  },
  {
    section: "JavaScript & TypeScript",
    q: "Order of output?",
    code: "console.log('A');\nsetTimeout(() => console.log('B'), 0);\nPromise.resolve().then(() => console.log('C'));\nconsole.log('D');",
    options: [
      "A B C D",
      "A D B C",
      "A D C B",
      "A C D B"
    ],
    correct: 2,
    explanation: "Synchronous code first: <code>A</code>, <code>D</code>. Then the <strong>microtask queue</strong> (Promises) drains before the <strong>macrotask queue</strong> (setTimeout): <code>C</code>, then <code>B</code>. Microtasks always beat macrotasks at the same tick."
  },
  {
    section: "JavaScript & TypeScript",
    q: "What does this TypeScript generic do?",
    code: "function pick<T, K extends keyof T>(obj: T, key: K): T[K] {\n  return obj[key];\n}",
    options: [
      "Accepts any key string and returns any type",
      "Constrains key to be a valid property of T and returns its specific value type",
      "Returns a copy of obj with only the given key",
      "Throws a compile error — generics can't reference each other"
    ],
    correct: 1,
    explanation: "<strong><code>K extends keyof T</code></strong> constrains <code>K</code> to the union of <code>T</code>'s actual keys, and <code>T[K]</code> is an indexed access type that resolves to the value type for that specific key. Pass a string that isn't a key and it won't compile."
  },

  // --- React ---
  {
    section: "React",
    q: "When does useEffect's cleanup function run?",
    options: [
      "Only when the component unmounts",
      "Before every re-run of the effect, and on unmount",
      "After every render, regardless of dependencies",
      "Only when dependencies are an empty array"
    ],
    correct: 1,
    explanation: "Cleanup runs <strong>before the next effect</strong> (whenever a dependency changes) <strong>and on unmount</strong>. This is why subscriptions, timers, and event listeners must be cleaned up — otherwise each re-run stacks a new one on top of the old."
  },
  {
    section: "React",
    q: "useMemo vs useCallback — which is true?",
    options: [
      "useMemo memoizes values, useCallback memoizes functions; otherwise identical purpose",
      "useCallback is faster and should be preferred",
      "useMemo always prevents re-renders; useCallback never does",
      "They're interchangeable"
    ],
    correct: 0,
    explanation: "<strong>useCallback(fn, deps)</strong> is essentially <code>useMemo(() => fn, deps)</code>. Both cache by dependency identity. Neither prevents re-renders by themselves — they prevent <em>downstream</em> re-renders when their result is passed to a memoized child (<code>React.memo</code>) or to another hook's deps."
  },
  {
    section: "React",
    q: "Why do React lists need a stable, unique key?",
    options: [
      "It's a lint rule — React doesn't actually need it",
      "Keys identify list items across renders so React can match them up; without them, state can attach to the wrong item",
      "Keys are used as DOM IDs",
      "Keys make rendering O(1)"
    ],
    correct: 1,
    explanation: "Keys let React's reconciler match elements between renders. Using <strong>array index as key</strong> is a common bug — if you insert at the start, every item shifts index, and React thinks every item changed. Internal state (form input values, focus) ends up on the wrong row."
  },
  {
    section: "React",
    q: "In React 18, this handler causes how many re-renders?",
    code: "function handleClick() {\n  setCount(c => c + 1);\n  setName('Vikas');\n  setActive(true);\n}",
    options: [
      "Three — one per setState",
      "Zero — setState is async, nothing happens until next tick",
      "One — React 18 automatically batches state updates, including inside promises and timeouts",
      "Two — only the last update triggers a render"
    ],
    correct: 2,
    explanation: "<strong>React 18 automatic batching</strong> groups all state updates in a single event into one re-render — and unlike React 17, this now extends to <code>setTimeout</code>, Promises, and native event handlers. Use <code>flushSync</code> if you actually need to opt out."
  },
  {
    section: "React",
    q: "Mutating a useRef's .current value causes a re-render?",
    options: [
      "Yes, always",
      "Yes, but only if .current is an object",
      "No — useRef is specifically for values that should persist across renders without triggering them",
      "Only if you call .current() as a function"
    ],
    correct: 2,
    explanation: "<strong>useRef does not subscribe to changes.</strong> That's its whole point — escape hatches for DOM nodes, timer IDs, latest-value mirrors. If you need a value change to render the UI, use <code>useState</code>."
  },

  // --- Next.js ---
  {
    section: "Next.js",
    q: "You're building an admin dashboard where data changes every few seconds. Best rendering strategy?",
    options: [
      "SSG (Static Site Generation) — pre-render at build time",
      "ISR (Incremental Static Regeneration) with a 60s revalidate",
      "Client-side fetching after a minimal SSR shell, or SSR per request — static pre-render gains you nothing here",
      "Pure SSR with caching headers set to 1 hour"
    ],
    correct: 2,
    explanation: "Dashboards with personalized, fast-changing data don't benefit from static pre-rendering — there's nothing to reuse across users or time. <strong>CSR after a thin SSR shell</strong> (or per-request SSR with no cache) is the right call. Save SSG/ISR for marketing pages, blogs, product catalogs."
  },
  {
    section: "Next.js",
    q: "In the Next.js App Router, where can you use useState and useEffect?",
    options: [
      "Anywhere — App Router removed the distinction",
      "Only in files marked 'use client' at the top — Server Components don't support hooks or browser APIs",
      "Only in pages, not layouts",
      "Only inside Server Components, never Client"
    ],
    correct: 1,
    explanation: "App Router components are <strong>Server Components by default</strong> — they run only on the server, can't use hooks, can't access <code>window</code>, but can do async data fetching directly and access the database. The <code>'use client'</code> directive at the top of a file opts the boundary into client rendering."
  },
  {
    section: "Next.js",
    q: "What's the App Router equivalent of getStaticPaths from Pages Router?",
    options: [
      "getServerSideProps",
      "generateStaticParams",
      "useRouter",
      "It was removed — App Router doesn't support dynamic static routes"
    ],
    correct: 1,
    explanation: "<strong>generateStaticParams</strong> in App Router returns the list of dynamic route segments to pre-render at build time, replacing <code>getStaticPaths</code>. Pair it with a Server Component that does async data fetching directly."
  },

  // --- Node / Express / Nest ---
  {
    section: "Node, Express & Nest.js",
    q: "Middleware order in Express:",
    code: "app.use(logger);\napp.use('/api', auth);\napp.use(errorHandler);\napp.get('/api/users', getUsers);",
    options: [
      "All middleware runs for every request",
      "Order doesn't matter — Express resolves by path specificity",
      "logger runs first; auth runs only for /api/* paths; errorHandler only catches errors thrown via next(err) or async rejections passed to next",
      "errorHandler runs first to catch boot errors"
    ],
    correct: 2,
    explanation: "Express middleware is <strong>strictly top-down</strong>, scoped by mount path. The error-handling middleware (4-arg signature) only fires when something calls <code>next(err)</code>. In native async handlers (pre-Express 5), unhandled rejections won't reach it unless you wrap them — use <code>express-async-errors</code> or upgrade."
  },
  {
    section: "Node, Express & Nest.js",
    q: "A CPU-heavy operation (e.g., bcrypt with high cost) inside an Express handler will:",
    options: [
      "Run on a separate thread automatically — Node is multithreaded",
      "Block the event loop, freezing all other requests until it finishes; offload to a worker thread or the libuv thread pool",
      "Time out at 30 seconds by default",
      "Run in parallel with other requests via the cluster module without configuration"
    ],
    correct: 1,
    explanation: "Node's main thread is <strong>single-threaded</strong>. Sync CPU work blocks every other in-flight request. <code>bcrypt</code>'s async variant offloads to <strong>libuv's thread pool</strong> (default 4 threads) — its sync variant blocks. For true parallelism, use <code>worker_threads</code> or <code>cluster</code>."
  },
  {
    section: "Node, Express & Nest.js",
    q: "In Nest.js, what's the default scope of a provider?",
    options: [
      "REQUEST — a new instance per HTTP request",
      "TRANSIENT — a new instance per consumer",
      "DEFAULT (Singleton) — one instance shared across the entire application",
      "There is no default; scope must be declared"
    ],
    correct: 2,
    explanation: "Nest providers are <strong>singletons by default</strong>. Use <code>@Injectable({ scope: Scope.REQUEST })</code> for per-request state (be careful — it cascades and hurts performance), or <code>Scope.TRANSIENT</code> for a fresh instance every injection."
  },
  {
    section: "Node, Express & Nest.js",
    q: "What's broken about this Express route in Node 18 / Express 4?",
    code: "app.get('/users/:id', async (req, res) => {\n  const user = await db.findUser(req.params.id);\n  res.json(user);\n});",
    options: [
      "Nothing — it works perfectly",
      "If db.findUser rejects, the error won't reach errorHandler unless you try/catch and call next(err), or use express-async-errors",
      "async handlers aren't supported in Express",
      "res.json doesn't await the user"
    ],
    correct: 1,
    explanation: "Express 4's router <strong>does not understand returned Promises</strong>. An unhandled rejection in an async handler bypasses your error middleware and surfaces as an <code>UnhandledPromiseRejection</code>. Fix: wrap in try/catch + <code>next(err)</code>, use the <code>express-async-errors</code> package, or migrate to Express 5 (which handles this)."
  },

  // --- Databases ---
  {
    section: "Databases",
    q: "Which query CANNOT use an index on (status, created_at) effectively in MongoDB / SQL?",
    options: [
      "WHERE status = 'active' AND created_at > '2025-01-01'",
      "WHERE status = 'active'",
      "WHERE created_at > '2025-01-01'",
      "WHERE status IN ('active','pending') ORDER BY created_at"
    ],
    correct: 2,
    explanation: "Composite indexes follow the <strong>leftmost-prefix rule</strong>. Filtering on <code>created_at</code> alone skips the leading <code>status</code> column, so the index is unusable (or only usable as a slow full-index scan). You'd need a separate index on <code>(created_at)</code>."
  },
  {
    section: "Databases",
    q: "users has 100 rows, orders has 250 rows (some users have no orders). How many rows does this return?",
    code: "SELECT u.id, o.id\nFROM users u\nLEFT JOIN orders o ON o.user_id = u.id;",
    options: [
      "Exactly 100",
      "Exactly 250",
      "At least 100 — every user appears at least once, with NULLs for users with no orders, plus one row per order for users with orders",
      "Between 0 and 25,000 — it's a Cartesian product"
    ],
    correct: 2,
    explanation: "<strong>LEFT JOIN preserves every row on the left.</strong> Users with no orders produce one row (with NULL for <code>o.id</code>); users with N orders produce N rows. So the result has at least 100 rows, and in this case exactly 250 + (users with zero orders)."
  },
  {
    section: "Databases",
    q: "In PostgreSQL's default isolation level (READ COMMITTED), what can happen within a transaction?",
    options: [
      "Phantom reads, non-repeatable reads, but not dirty reads",
      "Nothing weird — full serializability is the default",
      "Dirty reads are possible",
      "Reads always see a frozen snapshot from transaction start"
    ],
    correct: 0,
    explanation: "<strong>READ COMMITTED</strong> prevents dirty reads but allows non-repeatable reads (same row read twice can differ) and phantom reads (same query returns new rows). For snapshot consistency, use <code>REPEATABLE READ</code>; for full guarantees, <code>SERIALIZABLE</code>."
  },
  {
    section: "Databases",
    q: "MongoDB aggregation: where should $match typically go in this pipeline?",
    code: "[\n  { $lookup: { from: 'orders', ... } },\n  { $match: { status: 'active' } }\n]",
    options: [
      "Order doesn't matter — Mongo optimizes it automatically every time",
      "$match should come BEFORE $lookup so it filters the input collection first, dramatically reducing the number of documents joined",
      "$match should always come last",
      "$lookup must always come first"
    ],
    correct: 1,
    explanation: "Push <strong>$match as early as possible</strong>. Filtering before <code>$lookup</code> means you only join 10 documents instead of 10,000. Mongo's planner sometimes reorders, but don't rely on it — write the pipeline in the order that minimizes work."
  },

  // --- Python / FastAPI ---
  {
    section: "Python & FastAPI",
    q: "In FastAPI, when should you use `def` vs `async def` for an endpoint?",
    options: [
      "Always `async def` — it's faster",
      "Always `def` — async is for advanced cases",
      "`async def` when you await I/O (async DB drivers, httpx); `def` when the work is sync (sync DB libs like pymongo, blocking SDKs). FastAPI runs `def` handlers in a thread pool so they don't block the event loop",
      "It doesn't matter — FastAPI converts them"
    ],
    correct: 2,
    explanation: "If you use <code>async def</code> but call a <strong>blocking sync function</strong> inside it (e.g., <code>requests.get</code>, sync pymongo, time.sleep), you block the entire event loop and kill throughput. Either go fully async (httpx, motor, asyncpg) or use plain <code>def</code> and let FastAPI's threadpool handle concurrency."
  },
  {
    section: "Python & FastAPI",
    q: "What's Pydantic's main job in a FastAPI app?",
    options: [
      "ORM — replaces SQLAlchemy",
      "Runtime validation and parsing of incoming data against a typed schema, plus serialization back to JSON",
      "Logging",
      "Dependency injection"
    ],
    correct: 1,
    explanation: "Pydantic <strong>parses, validates, and coerces</strong> request bodies/query params/responses against a typed model. A request with the wrong shape is rejected with a 422 before your handler ever runs. Pydantic v2 is significantly faster than v1 (rewritten in Rust)."
  },

  // --- AI / Data awareness ---
  {
    section: "AI & Data Awareness",
    q: "In the context of LLMs, what is an embedding?",
    options: [
      "A compressed version of the model weights",
      "A fixed-length vector representation of text (or other content) where semantically similar inputs land closer together in vector space",
      "A prompt template",
      "The encoder portion of the transformer"
    ],
    correct: 1,
    explanation: "Embeddings turn text into numeric vectors (e.g., 1536 dimensions for OpenAI's <code>text-embedding-3-small</code>). Similar meanings → nearby vectors. This is the foundation of <strong>semantic search and RAG</strong>: embed your documents, embed the query, retrieve nearest neighbors by cosine similarity."
  },
  {
    section: "AI & Data Awareness",
    q: "What does this SQL window function do?",
    code: "SELECT user_id, order_date, amount,\n  ROW_NUMBER() OVER (PARTITION BY user_id ORDER BY order_date DESC) AS rn\nFROM orders;",
    options: [
      "Returns one row per user (the latest order)",
      "Returns all rows; assigns each a rank within its user partition, 1 = most recent order — letting you filter for the latest per user with WHERE rn = 1",
      "Counts orders per user",
      "It's invalid — ROW_NUMBER doesn't take ORDER BY"
    ],
    correct: 1,
    explanation: "Window functions compute a value <strong>per row, scoped to a window</strong> (partition), without collapsing rows like GROUP BY. <code>ROW_NUMBER() OVER (PARTITION BY user_id ORDER BY order_date DESC)</code> ranks each user's orders newest-to-oldest. Filtering <code>rn = 1</code> in an outer query gives you the latest order per user — a core data-engineering pattern."
  }
];

const state = {
  index: 0,
  answers: new Array(QUESTIONS.length).fill(null),
  revealed: new Array(QUESTIONS.length).fill(false),
  started: false,
  finished: false
};

const app = document.getElementById('app');
const progress = document.getElementById('progress');

function render() {
  if (!state.started) return renderIntro();
  if (state.finished) return renderResults();
  renderQuestion();
}

function renderIntro() {
  progress.style.width = '0%';
  app.innerHTML = `
    <div class="eyebrow"><span class="dot">●</span>&nbsp;&nbsp;Aavya LLC &nbsp;·&nbsp; Technical Assessment</div>
    <h1>Full-stack &amp; <em>data-aware</em><br/>technical screen.</h1>
    <p class="lede">Twenty-five questions across JavaScript, React, Next.js, Node, Nest, databases, FastAPI, and a touch of AI &amp; data — calibrated for a senior MERN candidate stepping into Python and data-platform work.</p>
    <div class="meta">
      <div class="meta-item"><span class="k">Candidate</span><span class="v">Vikas Chouhan</span></div>
      <div class="meta-item"><span class="k">Duration</span><span class="v">~35 minutes</span></div>
      <div class="meta-item"><span class="k">Format</span><span class="v">Multiple choice, instant feedback</span></div>
      <div class="meta-item"><span class="k">Honest mode</span><span class="v">No lookups, please</span></div>
    </div>
    <div class="cta-row">
      <button class="btn" onclick="start()">Begin assessment &nbsp;→</button>
      <span style="font-family:var(--mono); font-size:11px; color:var(--paper-mute); letter-spacing:.08em;">Press Enter to start</span>
    </div>
  `;
}

function start() {
  state.started = true;
  render();
}

function renderQuestion() {
  const i = state.index;
  const q = QUESTIONS[i];
  progress.style.width = `${((i) / QUESTIONS.length) * 100}%`;

  const optionsHtml = q.options.map((opt, idx) => {
    const letter = String.fromCharCode(65 + idx);
    const selected = state.answers[i] === idx;
    const revealed = state.revealed[i];
    let cls = 'option';
    if (revealed) {
      if (idx === q.correct) cls += ' correct';
      else if (selected) cls += ' wrong';
    } else if (selected) {
      cls += ' selected';
    }
    return `<button class="${cls}" ${revealed ? 'disabled' : ''} onclick="selectOption(${idx})">
      <span class="letter">${letter}</span><span>${escapeHtml(opt)}</span>
    </button>`;
  }).join('');

  const codeHtml = q.code ? `<div class="q-code">${escapeHtml(q.code)}</div>` : '';
  const explHtml = state.revealed[i]
    ? `<div class="explanation">${q.explanation}</div>`
    : '';

  const submitDisabled = state.answers[i] === null || state.revealed[i];
  const isLast = i === QUESTIONS.length - 1;

  app.innerHTML = `
    <div class="q-header">
      <div class="q-section">${q.section}</div>
      <div class="q-counter">${String(i + 1).padStart(2, '0')} / ${String(QUESTIONS.length).padStart(2, '0')}</div>
    </div>
    <h2 class="q-text">${escapeHtml(q.q)}</h2>
    ${codeHtml}
    <div class="options">${optionsHtml}</div>
    ${explHtml}
    <div class="nav-row">
      <button class="btn ghost" onclick="prev()" ${i === 0 ? 'disabled' : ''}>← Previous</button>
      ${state.revealed[i]
        ? `<button class="btn" onclick="next()">${isLast ? 'See results' : 'Next question'} &nbsp;→</button>`
        : `<button class="btn" onclick="reveal()" ${submitDisabled ? 'disabled' : ''}>Submit answer</button>`
      }
    </div>
  `;
}

function selectOption(idx) {
  if (state.revealed[state.index]) return;
  state.answers[state.index] = idx;
  renderQuestion();
}

function reveal() {
  if (state.answers[state.index] === null) return;
  state.revealed[state.index] = true;
  renderQuestion();
}

function next() {
  if (state.index === QUESTIONS.length - 1) {
    state.finished = true;
    render();
  } else {
    state.index++;
    render();
  }
}

function prev() {
  if (state.index > 0) {
    state.index--;
    render();
  }
}

function renderResults() {
  progress.style.width = '100%';
  const sectionAgg = {};
  QUESTIONS.forEach((q, i) => {
    if (!sectionAgg[q.section]) sectionAgg[q.section] = { right: 0, total: 0 };
    sectionAgg[q.section].total++;
    if (state.answers[i] === q.correct) sectionAgg[q.section].right++;
  });
  const total = QUESTIONS.length;
  const right = QUESTIONS.reduce((s, q, i) => s + (state.answers[i] === q.correct ? 1 : 0), 0);
  const pct = Math.round((right / total) * 100);

  let band, verdict;
  if (pct >= 80) {
    band = "Strong";
    verdict = "Confident command of the claimed stack <strong>and</strong> meaningful awareness beyond it. Move forward to the live coding round and the FastAPI / data assignment.";
  } else if (pct >= 60) {
    band = "Solid";
    verdict = "Working knowledge is there. Probe the weak sections live — concept questions where the wrong answer suggests cargo-cult usage are worth ten minutes of follow-up.";
  } else if (pct >= 40) {
    band = "Developing";
    verdict = "Day-to-day delivery skill likely present, but depth is thin — typical pattern for someone who has shipped on one stack at one employer without much variation. Decide whether you have the runway to mentor.";
  } else {
    band = "Below bar";
    verdict = "Significant gaps across fundamentals. The CV claims and the answers don't reconcile. Skip ahead or close the loop politely.";
  }

  const scoreCards = Object.entries(sectionAgg).map(([sec, v]) => {
    const w = Math.round((v.right / v.total) * 100);
    return `
      <div class="score-card">
        <div class="label">${sec}</div>
        <div class="value">${v.right}<span class="total"> / ${v.total}</span></div>
        <div class="bar"><span style="width:${w}%"></span></div>
      </div>
    `;
  }).join('');

  const reviewItems = QUESTIONS.map((q, i) => {
    const given = state.answers[i];
    const isRight = given === q.correct;
    const letterOf = (n) => n === null ? '—' : String.fromCharCode(65 + n);
    return `
      <div class="review-item ${isRight ? 'right' : 'wrong'}">
        <div class="num">${String(i + 1).padStart(2, '0')} · ${q.section}</div>
        <div class="q">${escapeHtml(q.q)}</div>
        <div class="a">Your answer: <span class="${isRight ? 'right' : 'given'}">${letterOf(given)}</span> &nbsp;·&nbsp; Correct: <span class="right">${letterOf(q.correct)}</span></div>
      </div>
    `;
  }).join('');

  app.innerHTML = `
    <div class="eyebrow"><span class="dot">●</span>&nbsp;&nbsp;Assessment complete</div>
    <h1>${right} of ${total} <em>correct</em>.<br/>That's <em>${pct}%</em>.</h1>
    <p class="lede">Band: <strong style="color:var(--accent); font-style:normal;">${band}</strong></p>
    <div class="verdict">${verdict}</div>
    <div class="section-title">Score by area</div>
    <div class="score-grid">${scoreCards}</div>
    <div class="section-title">Question-by-question review</div>
    <div class="review-list">${reviewItems}</div>
    <div class="cta-row">
      <button class="btn ghost" onclick="restart()">↺ Restart</button>
      <button class="btn" onclick="window.print()">Print / Save as PDF</button>
    </div>
  `;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
  state.index = 0;
  state.answers = new Array(QUESTIONS.length).fill(null);
  state.revealed = new Array(QUESTIONS.length).fill(false);
  state.started = false;
  state.finished = false;
  render();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !state.started) start();
});

render();
</script>
</body>
</html>
