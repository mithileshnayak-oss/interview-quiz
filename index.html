<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0e1a;--surface:#11162a;--surface2:#161c34;--border:#222a44;
  --text:#e2e8f0;--muted:#64748b;--dim:#475569;
  --purple:#a855f7;--purple-bg:rgba(168,85,247,0.1);--purple-border:rgba(168,85,247,0.3);

}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.landing .lead-line{color:var(--muted);font-size:15px;max-width:520px;line-height:1.6;margin-bottom:8px}
.landing .exp-line{color:var(--purple);font-size:14px;font-weight:600;margin-bottom:24px}
.stat-row{display:flex;gap:28px;margin-bottom:36px}
.stat .num{font-size:30px;font-weight:800;color:var(--purple)}.stat .lbl{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}

.header{background:var(--surface2);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}

/* TERMINAL */

.next-btn{padding:10px 32px;border-radius:10px;background:linear-gradient(135deg,#a855f7,#06b6d4);color:#fff;font-weight:700;font-size:14px;border:none;box-shadow:0 0 20px rgba(168,85,247,.2)}

/* COMPLETION */
.completion{text-align:center;padding:60px 24px;animation:fadeUp .6s ease-out}
.completion h2{font-size:28px;font-weight:800;margin-bottom:8px;letter-spacing:-.03em}
.score-ring{width:140px;height:140px;border-radius:50%;margin:0 auto 24px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-size:40px;font-weight:800;line-height:1}.ring-lbl{font-size:12px;color:var(--muted)}
.grade-badge{display:inline-block;padding:8px 24px;border-radius:10px;font-weight:700;font-size:16px;margin-bottom:28px}
.score-bk{display:flex;gap:36px;justify-content:center;margin-bottom:40px}
.score-bk .si .v{font-size:26px;font-weight:800}.score-bk .si .d{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em}
.restart-btn{padding:12px 36px;border-radius:10px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-weight:600;font-size:14px}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:600px){.result-grid{grid-template-columns:1fr}.stat-row{gap:16px}.main{padding:12px 14px}.tabs{padding:10px 12px}}

<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useRef}=React;

const questions=[

// ═══════════════════════════════════════════════════════════
// PART A — PHP & Laravel  (6 Qs) — Senior Level
// ═══════════════════════════════════════════════════════════

{part:"A",cat:"PHP & Laravel",diff:"Medium",
code:`// Laravel Eloquent — User has many Orders, each Order has many Products
// Common N+1 mistake:

$users = User::all();  // 1 query
foreach ($users as $user) {
    echo $user->orders->count();        // +1 query per user
    foreach ($user->orders as $order) {
        echo $order->products->count(); // +1 query per order
    }
}

// 100 users × 10 orders = 1 + 100 + 1000 = 1101 queries!

// What's the CORRECT Eloquent pattern to fix this?

A) Use DB::raw() to write a single raw SQL JOIN query

B) Eager loading with with():
   $users = User::with('orders.products')->get();
   // Total queries: 3 (users, orders, products)

C) Increase MySQL connection pool size

D) Switch from Eloquent to Query Builder for performance`,
output:`B) Eager Loading with with('orders.products')

1101 queries → 3 queries.
with() uses WHERE IN clauses to batch-load
related records. Dot notation for nested relations.`,
why:`The N+1 problem is the most common Laravel performance issue. Lazy loading (default) fires a new query for each related model access. with() eager loads relationships in batched queries — instead of 100 individual queries for orders, Laravel runs ONE query with WHERE user_id IN (1,2,...,100). Nested relations use dot notation: with('orders.products'). For conditional eager loading, use load() after the initial query. To detect N+1 in development, enable strict mode: Model::preventLazyLoading() — throws an exception if lazy loading occurs. This is foundational senior-level Laravel knowledge.`},

{part:"A",cat:"PHP & Laravel",diff:"Medium",
code:`// You're building the eSignly digital signature platform.
// API endpoint receives a request to sign a document.

// Approach A: Synchronous processing
public function signDocument(Request $request) {
    $doc = Document::find($request->id);
    $signed = $this->signService->process($doc);  // 15s
    $this->notifyService->send($doc->user);       // 3s
    $this->auditLog->record($doc);                // 1s
    return response()->json(['status' => 'done']); // Total: 19s
}

// User waits 19 seconds for the API response!

// What's the BEST Laravel approach to fix this?

A) Add @ini_set('max_execution_time', 60) to allow longer requests

B) Dispatch a Laravel Job to a queue (Redis/database/SQS),
   return 202 Accepted immediately, process async.
   Use Job chaining or Job batching for the sequence.
   User polls a status endpoint or gets a webhook.

C) Optimize the signing algorithm to be faster

D) Run the code inside a database transaction`,
output:`B) Laravel Queue + Jobs (async processing)

dispatch(new SignDocumentJob($doc))->onQueue('signing');
Return 202 Accepted immediately.
Workers process via: php artisan queue:work redis
Notify via WebSocket, polling, or webhook on completion.`,
why:`Long-running synchronous APIs are a senior-level architecture mistake — they block worker threads, hit timeouts, and create poor UX. Laravel's Queue system (Redis/Database/SQS/RabbitMQ drivers) lets you dispatch jobs asynchronously: dispatch(new ProcessSignature($doc)). The API returns immediately, workers consume the queue. For sequences: Bus::chain() (run jobs in order), or Bus::batch() (parallel batch with completion callback). For real-time progress: Laravel Echo + WebSockets or simple polling. This is THE pattern for any I/O-heavy Laravel application — and Rahul's eSignly platform absolutely uses this.`},

{part:"A",cat:"PHP & Laravel",diff:"Hard",
code:`// Laravel Service Container — Dependency Injection
// You have an interface and two implementations:

interface PaymentGateway {
    public function charge($amount);
}

class StripeGateway implements PaymentGateway { /* ... */ }
class RazorpayGateway implements PaymentGateway { /* ... */ }

// In your controller:
public function pay(PaymentGateway $gateway) {
    $gateway->charge(100);
}

// Laravel doesn't know which implementation to inject!
// How do you tell Laravel which one to use?

A) Use @Inject annotations on the controller method

B) Bind the interface in AppServiceProvider's register() method:
   $this->app->bind(PaymentGateway::class, function($app) {
       return config('app.gateway') === 'stripe'
           ? new StripeGateway() : new RazorpayGateway();
   });

C) Pass the implementation class as a string argument

D) Use static class methods instead of dependency injection`,
output:`B) Service Container binding in AppServiceProvider

In register() method, bind the interface to a concrete class.
Use contextual binding for different controllers needing
different implementations. Use singleton() for shared instances.`,
why:`Service Container is Laravel's IoC (Inversion of Control) heart. Bindings can be: simple (bind/singleton), contextual (when()->needs()->give()), tagged, or instance. Code: $this->app->bind(PaymentGateway::class, StripeGateway::class) — auto-resolves on injection. For multiple controllers needing different implementations, use contextual binding: $this->app->when(InvoiceController::class)->needs(PaymentGateway::class)->give(StripeGateway::class). singleton() ensures one instance across the request. Senior Laravel devs must understand this — it's the foundation of testability, SOLID principles, and clean architecture in Laravel.`},

{part:"A",cat:"PHP & Laravel",diff:"Hard",
code:`// Your eSignly platform handles 50,000 documents per day.
// MySQL slow query log shows this query taking 8+ seconds:

SELECT documents.*, users.name, organizations.name
FROM documents
JOIN users ON documents.user_id = users.id
JOIN organizations ON users.org_id = organizations.id
WHERE documents.status = 'pending'
  AND documents.created_at >= '2026-01-01'
ORDER BY documents.created_at DESC
LIMIT 50;

// EXPLAIN shows: type=ALL, rows=2400000 on documents table.

// What's the BIGGEST optimization win?

A) Cache the query result with Redis for 5 minutes

B) Add a composite index covering the WHERE + ORDER BY:
   CREATE INDEX idx_status_created 
   ON documents(status, created_at DESC);
   Now MySQL can use the index to filter AND sort, avoiding
   a full table scan + filesort.

C) Switch from MySQL to MongoDB

D) Increase MySQL innodb_buffer_pool_size`,
output:`B) Composite index on (status, created_at DESC)

type=ALL means full table scan (2.4M rows!).
Composite index serves WHERE status + ORDER BY created_at.
Index order matters: equality columns first, then range/sort.`,
why:`Database indexing strategy is critical senior knowledge. The EXPLAIN shows type=ALL = full table scan over 2.4M rows. The query has TWO things MySQL needs: filter by status + range on created_at + sort by created_at. A composite index (status, created_at) lets MySQL: (1) use the index to find pending docs, (2) use the same index for sorting (avoiding filesort). Rule: equality columns first, then range/sort columns. Even with caching (A), the underlying query would still be slow on cache miss. innodb_buffer_pool_size helps but doesn't fix the root cause. After this index, EXPLAIN should show type=range and Using index.`},

{part:"A",cat:"PHP & Laravel",diff:"Medium",
code:`// Laravel API security review:
// Your team built this endpoint for the SaaS dashboard:

Route::get('/api/documents/{id}', function($id) {
    $doc = Document::find($id);
    return response()->json($doc);
});

// Security review flags TWO critical issues. What are they?

A) Missing rate limiting and CSRF token

B) (1) No authentication check — any user can access any doc.
   (2) No authorization — even authenticated users could access
       OTHER users' documents (IDOR — Insecure Direct Object
       Reference). Fix: use middleware('auth:sanctum') and
       a Policy or Gate to verify ownership.

C) Should use POST instead of GET for security

D) Missing CORS headers`,
output:`B) Missing AUTH + missing IDOR protection

(1) auth middleware → require login
(2) Policy / Gate → check document ownership

Route::get('/api/documents/{document}', ...)
    ->middleware(['auth:sanctum', 'can:view,document']);`,
why:`This is a textbook IDOR (Insecure Direct Object Reference) vulnerability — one of OWASP's Top 10. Even if you add authentication, a logged-in user could iterate IDs (1, 2, 3, ...) to access other users' documents. Laravel's solution: (1) auth:sanctum or auth:web middleware to require authentication, (2) Policies for authorization — php artisan make:policy DocumentPolicy, define view() method checking $user->id === $document->user_id, (3) apply via 'can:view,document' middleware or $this->authorize('view', $document) in the controller. For Rahul's eSignly platform (security-critical), this is non-negotiable knowledge. Senior devs spot IDOR instantly.`},

{part:"A",cat:"PHP & Laravel",diff:"Medium",
code:`// Laravel queue worker stops processing jobs in production
// after a few hours. Jobs pile up in the failed_jobs table.

// You SSH into the server and check:
$ php artisan queue:work --daemon
# (Running, but processes random jobs and stops)

// Investigation shows:
// - Memory usage grows over time (memory leak)
// - One worker handles 10K+ jobs before silent crash

// Which is the CORRECT production setup?

A) Run queue:work without --daemon flag

B) Use Supervisor (Linux process manager) to restart the
   worker if it crashes. Combine with --max-jobs=1000 or
   --max-time=3600 to recycle workers (PHP doesn't release
   memory well across many jobs). Use Horizon for Redis
   queues — built-in dashboard + auto-scaling.

C) Increase PHP's memory_limit to 1GB

D) Switch from Laravel queues to a Bash cron job`,
output:`B) Supervisor + worker recycling + Horizon

Supervisor: auto-restart on crash.
--max-jobs / --max-time: prevent memory leaks.
Horizon: production-grade Redis queue manager with
dashboard, metrics, and auto-scaling.`,
why:`Running Laravel queue workers in production has well-known pitfalls. PHP doesn't reclaim memory cleanly across many job executions — workers accumulate memory and eventually OOM-crash. Production setup: (1) Supervisor (or systemd) to manage worker lifecycle and auto-restart, (2) --max-jobs=1000 or --max-time=3600 flags so workers recycle before memory issues, (3) Laravel Horizon for Redis-backed queues — gives you metrics, dashboard, auto-scaling. Without Supervisor, a single crash leaves jobs unprocessed for hours. This is the difference between "works in dev" and "scales in production" — and exactly what Rahul should know as a 9-year senior.`},

// ═══════════════════════════════════════════════════════════
// PART B — React, Frontend & AEM  (6 Qs)
// ═══════════════════════════════════════════════════════════

{part:"B",cat:"React & Frontend",diff:"Easy",
code:`// React component re-renders too often in your dashboard:

function Dashboard({ user, settings }) {
  const [filter, setFilter] = useState('all');
  
  return (
    <>
      <FilterBar onChange={setFilter} />
      <ExpensiveChart  
        data={user.transactions}
        config={{ theme: 'dark', size: 'lg' }}  // ← problem!
      />
    </>
  );
}

// ExpensiveChart re-renders even when only 'filter' changes.
// Why? And what's the fix?

A) Wrap ExpensiveChart in useMemo

B) The 'config' prop is a NEW object literal on every render.
   ExpensiveChart's React.memo (if used) fails because
   { theme:'dark', size:'lg' } !== { theme:'dark', size:'lg' }
   (different references).
   Fix: useMemo the config object, OR move it outside the component.

C) ExpensiveChart needs useCallback wrapper

D) Use useRef instead of useState for filter`,
output:`B) Inline object literals = new reference every render

Fix:
const config = useMemo(() => ({ theme:'dark', size:'lg' }), []);

Or define static config outside component:
const CHART_CONFIG = { theme:'dark', size:'lg' };`,
why:`This is one of the most common React performance bugs. React.memo and shouldComponentUpdate use shallow comparison (Object.is) on props. Inline object/array literals { ... } and [ ... ] create a new reference on every render — defeating memoization. Same with inline functions: onClick={() => doX()}. Solutions: (1) Static values: define outside the component, (2) Dynamic values: useMemo for objects/arrays, useCallback for functions. This is foundational for a 5-year React developer. Rahul lists React.js with Hooks and Context API — he should know this cold.`},

{part:"B",cat:"React & Frontend",diff:"Medium",
code:`// Context API problem:
// Your Dashboard has 50 components consuming UserContext:

const UserContext = createContext();

  const[name,setName]=useState("");
  const[activePart,setActivePart]=useState("A");
  const[idx,setIdx]=useState(0);
  const[answers,setAnswers]=useState({});
  const[submitted,setSubmitted]=useState({});
  const[input,setInput]=useState("");
  const[typingKey,setTypingKey]=useState(null);
  const[typed,setTyped]=useState("");
  const[finished,setFinished]=useState(false);
  const[elapsed,setElapsed]=useState(0);
  const startTime=useRef(Date.now());
  const inputRef=useRef(null);

  const filtered=questions.filter(q=>q.part===activePart);
  const q=filtered[idx];
  const gi=questions.indexOf(q);
  const isSubmitted=submitted[gi]!==undefined;

  useEffect(()=>{ setIdx(0); },[activePart]);
  useEffect(()=>{
    if(!started||finished)return;
    const t=setInterval(()=>setElapsed(Math.floor((Date.now()-startTime.current)/1000)),1000);
    return()=>clearInterval(t);
  },[started,finished]);
  useEffect(()=>{
    if(typingKey===null)return;
    const out=q.output; let i=0; setTyped("");
    const iv=setInterval(()=>{ i++; setTyped(out.slice(0,i)); if(i>=out.length)clearInterval(iv); },14);
    return()=>clearInterval(iv);
  },[typingKey]);
  useEffect(()=>{ if(!isSubmitted&&inputRef.current)inputRef.current.focus(); },[idx,activePart,isSubmitted]);

  const fmt=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;
  const checkAnswer=(ans)=>{
    const l=ans.trim().toLowerCase().replace(/[^a-d].*/,"").charAt(0);
    const c=q.output.toLowerCase().charAt(0);
    return l===c&&l!=="";
  };

  const handleSubmit=(skipped)=>{
    const userAns=skipped?"(skipped)":input.trim();
    setAnswers(a=>({...a,[gi]:userAns}));
    const correct=!skipped&&checkAnswer(userAns);
    setSubmitted(s=>({...s,[gi]:skipped?"skip":correct?"ok":"wrong"}));
    setTypingKey(Date.now()); setInput("");
  };

  const handleNext=()=>{
    if(idx<filtered.length-1){ setIdx(i=>i+1); setTypingKey(null); setTyped(""); }
    else{
      const ni=PARTS.findIndex(p=>p.key===activePart);
      if(ni<PARTS.length-1){ setActivePart(PARTS[ni+1].key); setTypingKey(null); setTyped(""); }
      else setFinished(true);
    }
  };

  const totalAnswered=Object.keys(submitted).length;
  const totalOk=Object.values(submitted).filter(v=>v==="ok").length;
  const totalWrong=Object.values(submitted).filter(v=>v==="wrong").length;
  const totalSkip=Object.values(submitted).filter(v=>v==="skip").length;
  const part=PARTS.find(p=>p.key===activePart);

  if(!started) return(
    <div className="landing">
      <div className="landing-icon">🔷</div>
      <h1>Senior Full Stack Assessment</h1>
      <div className="lead-line">PHP · Laravel · React · Node.js · AEM Headless · DevOps</div>
      <div className="exp-line">Calibrated for 8+ years experience · Tech Lead Level</div>
      <div className="tech-tags">
        {["PHP","Laravel","React.js + Hooks","Node.js","Express.js","MySQL","Eloquent ORM","REST APIs","AEM Headless","Content Fragments","Docker","CI/CD","SonarQube","Microservices","Event-Driven","Team Leadership"].map(t=><span key={t} className="tech-tag">{t}</span>)}
      </div>
      <div className="stat-row">
        <div className="stat"><div className="num">22</div><div className="lbl">Questions</div></div>
        <div className="stat"><div className="num">4</div><div className="lbl">Sections</div></div>
        <div className="stat"><div className="num">~30</div><div className="lbl">Minutes</div></div>
      </div>
      <div className="rules-box">
        <h3>Instructions</h3>
        <ol>
          <li>Read each scenario or code snippet carefully</li>
          <li>Type the letter of your answer — A, B, C, or D</li>
          <li>Submit to reveal correct answer with detailed explanation</li>
          <li>This assessment is calibrated for senior / tech lead level</li>
        </ol>
      </div>
      <input className="name-input" value={name} onChange={e=>setName(e.target.value)} placeholder="Enter your name..."/>
      <br/>
      <button className="start-btn" onClick={()=>setStarted(true)} disabled={!name.trim()}>Begin Assessment →</button>
    </div>
  );

  if(finished){
    const pct=Math.round((totalOk/questions.length)*100);
    const grade=pct>=82?"Strong Hire — Tech Lead":pct>=68?"Strong Senior Hire":pct>=50?"Mid-Level":"Below Senior Bar";
    const gc=pct>=82?"#22c55e":pct>=68?"#a855f7":pct>=50?"#f59e0b":"#ef4444";
    return(
      <div className="completion">
        <div className="score-ring" style={{border:`4px solid ${gc}`,boxShadow:`0 0 40px ${gc}20`}}>
          <div className="ring-pct" style={{color:gc}}>{pct}%</div>
          <div className="ring-lbl">Score</div>
        </div>
        <h2>Assessment Complete!</h2>
        <p>{name} · {fmt(elapsed)}</p>
        <div className="grade-badge" style={{background:`${gc}18`,border:`1px solid ${gc}40`,color:gc}}>{grade}</div>
        <div className="score-bk">
          <div className="si"><div className="v" style={{color:"#4ade80"}}>{totalOk}</div><div className="d">Correct</div></div>
          <div className="si"><div className="v" style={{color:"#f87171"}}>{totalWrong}</div><div className="d">Wrong</div></div>
          <div className="si"><div className="v" style={{color:"#fbbf24"}}>{totalSkip}</div><div className="d">Skipped</div></div>
        </div>
        <button className="restart-btn" onClick={()=>{setStarted(false);setActivePart("A");setIdx(0);setAnswers({});setSubmitted({});setFinished(false);setTypingKey(null);setTyped("");setName("");}}>Restart</button>
      </div>
    );
  }

  return(
    <div>
      <div className="header">
        <div className="header-left">
          <div className="header-icon">🔷</div>
          <div>
            <div className="header-title">Senior Full Stack — Rahul Saxena</div>
            <div className="header-sub">{name} · {fmt(elapsed)}</div>
          </div>
        </div>
        <div className="score-pills">
          <div className="pill pill-green">✓ {totalOk}</div>
          <div className="pill pill-red">✗ {totalWrong}</div>
          <div className="pill pill-total">{totalAnswered}/{questions.length}</div>
        </div>
      </div>

      <div className="tabs">
        {PARTS.map(p=>{
          const qs=questions.filter(q2=>q2.part===p.key);
          const done=qs.filter(q2=>submitted[questions.indexOf(q2)]!==undefined).length;
          return(
            <button key={p.key} className={`tab ${activePart===p.key?"active":""}`}
              style={{"--tab-color":p.color}} onClick={()=>setActivePart(p.key)}>
              <span>{p.icon}</span>{p.label}<span className="tab-badge">{done}/{qs.length}</span>
            </button>
          );
        })}
      </div>

      <div className="main">
        <div className="q-header">
          <div className="q-header-left">
            <span className="q-num">Q{idx+1}/{filtered.length}</span>
            <span className="diff-badge" style={{color:diffColor[q.diff],background:`${diffColor[q.diff]}18`,border:`1px solid ${diffColor[q.diff]}30`}}>{q.diff}</span>
            <span className="q-hint">Type A · B · C · D</span>
          </div>
          <div className="nav-btns">
            <button className="nav-btn" onClick={()=>{setIdx(i=>i-1);setTypingKey(null);setTyped("");}} disabled={idx===0}>←</button>
            <button className="nav-btn" onClick={handleNext} disabled={!isSubmitted}>→</button>
          </div>
        </div>

        <div className="editor">
          <div className="editor-bar">
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div className="dots">
                <div className="dot" style={{background:"#ef4444"}}/>
                <div className="dot" style={{background:"#f59e0b"}}/>
                <div className="dot" style={{background:"#22c55e"}}/>
              </div>
              <span className="filename">question_{String(gi+1).padStart(2,"0")}.php</span>
            </div>
            <span className="lang-pill" style={{color:part?.color,background:`${part?.color}18`,border:`1px solid ${part?.color}30`}}>{q.cat.toUpperCase()}</span>
          </div>
          <div className="code-body">
            {q.code.split("\n").map((line,i)=>(
              <div className="code-line" key={i}>
                <span className="line-no">{i+1}</span>
                <span style={{color:"#e2e8f0",whiteSpace:"pre-wrap"}}>{line}</span>
              </div>
            ))}
          </div>
        </div>

        {!isSubmitted&&(
          <div className="answer-box">
            <div className="answer-label">Your Answer</div>
            <textarea ref={inputRef} className="answer-input" value={input} onChange={e=>setInput(e.target.value)}
              placeholder="Type A, B, C, or D..."
              onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey&&input.trim()){ e.preventDefault(); handleSubmit(false); } }}
              style={{minHeight:"48px",resize:"none"}}
            />
            <div className="submit-row">
              <button className="skip-btn" onClick={()=>handleSubmit(true)}>Skip →</button>
              <button className="submit-btn" onClick={()=>handleSubmit(false)} disabled={!input.trim()}>Submit Answer</button>
            </div>
          </div>
        )}

        {isSubmitted&&(<>
          <div className="terminal revealed">
            <div className="terminal-bar">
              <span>⬡ Result</span>
              <span style={{color:"#22c55e"}}>● evaluated</span>
            </div>
            <div className="terminal-body">
              <div className="terminal-cmd">$ php artisan evaluate --q{gi+1}</div>
              {typed.split("\n").map((l,i)=><div className="terminal-out" key={i}>{l}</div>)}
            </div>
          </div>

          <div className={`result-card ${submitted[gi]==="ok"?"result-correct":submitted[gi]==="wrong"?"result-wrong":"result-skip"}`}>
            <div className="result-header">
              {submitted[gi]==="ok"&&"✓ Correct!"}
              {submitted[gi]==="wrong"&&"✗ Incorrect"}
              {submitted[gi]==="skip"&&"⏭ Skipped"}
            </div>
            <div className="result-body">
              {submitted[gi]!=="skip"?(
                <div className="result-grid">
                  <div className="result-col"><label>Your Answer</label><pre>{answers[gi]}</pre></div>
                  <div className="result-col"><label>Correct Answer</label><pre style={{borderColor:"#166534"}}>{q.output}</pre></div>
                </div>
              ):(
                <div className="result-grid" style={{gridTemplateColumns:"1fr"}}>
                  <div className="result-col"><label>Correct Answer</label><pre>{q.output}</pre></div>
                </div>
              )}
              <div className="result-why"><strong>Why: </strong>{q.why}</div>
            </div>
          </div>

          <div style={{textAlign:"center",marginTop:12}}>
            <button className="next-btn" onClick={handleNext}>
              {idx<filtered.length-1?"Next Question →":PARTS.findIndex(p=>p.key===activePart)<PARTS.length-1?"Next Section →":"Finish →"}
            </button>
          </div>
        </>)}

        <div className="progress-dots">
          {filtered.map((fq,i)=>{
            const fgi=questions.indexOf(fq);
            const st=submitted[fgi];
            const cls=`pdot ${i===idx?"current":st==="ok"?"ok":st==="wrong"?"wrong":st==="skip"?"skip":"pending"}`;
            return <button key={i} className={cls} onClick={()=>{setIdx(i);setTypingKey(null);setTyped("");}}/>;
          })}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
