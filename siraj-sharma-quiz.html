<!DOCTYPE html>
<html lang="en">
<head>

<title>Siraj Sharma — Frontend · DataViz · Performance Assessment</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0e14;--surface:#111827;--surface2:#151a27;--border:#1e293b;
  --text:#e2e8f0;--muted:#64748b;--dim:#475569;
  --blue:#4f8ef7;--blue-bg:rgba(79,142,247,0.1);--blue-border:rgba(79,142,247,0.3);
  --violet:#8b5cf6;--violet-bg:rgba(139,92,246,0.1);--violet-border:rgba(139,92,246,0.3);
  --emerald:#10b981;--emerald-bg:rgba(16,185,129,0.1);--emerald-border:rgba(16,185,129,0.3);
  --orange:#f97316;--orange-bg:rgba(249,115,22,0.1);--orange-border:rgba(249,115,22,0.3);
  --green:#22c55e;--red:#ef4444;--yellow:#f59e0b;
}
body{background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh}
button{font-family:inherit;cursor:pointer;border:none}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* LANDING */
.landing{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px;text-align:center}
.landing-icon{width:76px;height:76px;border-radius:22px;background:linear-gradient(135deg,#4f8ef7,#8b5cf6,#10b981);display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:24px;box-shadow:0 0 60px rgba(79,142,247,.35)}
.landing h1{font-size:28px;font-weight:800;letter-spacing:-.03em;margin-bottom:8px}
.landing p{color:var(--muted);font-size:15px;max-width:520px;line-height:1.6;margin-bottom:28px}
.stat-row{display:flex;gap:28px;margin-bottom:36px}
.stat .num{font-size:30px;font-weight:800;color:var(--blue)}.stat .lbl{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}
.tech-tags{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:28px}
.tech-tag{padding:4px 12px;border-radius:6px;font-size:11px;font-weight:600;background:var(--surface);border:1px solid var(--border);color:var(--muted);font-family:'JetBrains Mono',monospace}
.rules-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 28px;text-align:left;max-width:520px;margin-bottom:32px}
.rules-box h3{font-size:12px;color:var(--blue);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.rules-box li{color:var(--muted);font-size:13px;line-height:1.9;margin-left:16px}
.name-input{padding:12px 20px;border-radius:10px;border:1px solid var(--border);background:#111827;color:#e2e8f0;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;width:280px;text-align:center;margin-bottom:16px;outline:none}
.name-input:focus{border-color:var(--blue)}
.start-btn{padding:14px 48px;border-radius:12px;background:linear-gradient(135deg,#4f8ef7,#8b5cf6);color:#fff;font-weight:700;font-size:16px;box-shadow:0 0 40px rgba(79,142,247,.25);transition:all .3s}
.start-btn:disabled{opacity:.4;cursor:not-allowed}

/* HEADER */
.header{background:var(--surface2);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.header-left{display:flex;align-items:center;gap:12px}
.header-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#4f8ef7,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:16px}
.header-title{font-weight:800;font-size:15px;letter-spacing:-.02em}
.header-sub{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.score-pills{display:flex;gap:8px}
.pill{padding:5px 14px;border-radius:8px;font-weight:600;font-size:13px;font-family:'JetBrains Mono',monospace}
.pill-green{background:#0b2e1a;border:1px solid #166534;color:#4ade80}
.pill-red{background:#2a0f10;border:1px solid #991b1b;color:#f87171}
.pill-total{background:var(--border);color:#94a3b8}

/* TABS */
.tabs{display:flex;gap:6px;padding:12px 24px;background:#0f1219;overflow-x:auto;border-bottom:1px solid var(--border)}
.tab{padding:10px 18px;border-radius:10px;border:1px solid transparent;background:transparent;color:var(--muted);font-weight:600;font-size:13px;display:flex;align-items:center;gap:8px;white-space:nowrap;transition:all .2s}
.tab.active{border-color:var(--tab-color);background:color-mix(in srgb,var(--tab-color) 10%,transparent);color:var(--tab-color)}
.tab-badge{padding:2px 8px;border-radius:6px;font-size:11px;background:var(--border);color:var(--dim)}
.tab.active .tab-badge{background:color-mix(in srgb,var(--tab-color) 15%,transparent);color:var(--tab-color)}

/* MAIN */
.main{padding:16px 24px;max-width:860px;margin:0 auto}
.q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.q-header-left{display:flex;align-items:center;gap:10px}
.q-num{font-weight:700;font-size:14px}
.diff-badge{font-size:11px;padding:3px 10px;border-radius:6px;font-weight:600}
.q-hint{font-size:11px;color:var(--dim)}
.nav-btns{display:flex;gap:6px}
.nav-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:#94a3b8;display:flex;align-items:center;justify-content:center;font-size:14px}
.nav-btn:disabled{color:#334155;cursor:default}

/* EDITOR */
.editor{border-radius:12px;overflow:hidden;border:1px solid var(--border);margin-bottom:12px}
.editor-bar{background:var(--surface2);padding:8px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.dots{display:flex;gap:6px}.dot{width:10px;height:10px;border-radius:50%}
.filename{font-size:11px;color:var(--dim);margin-left:10px;font-family:'JetBrains Mono',monospace}
.lang-pill{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600;font-family:'JetBrains Mono',monospace}
.code-body{background:var(--bg);padding:16px 20px;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.7;overflow-x:auto}
.code-line{display:flex}.line-no{color:#334155;width:32px;text-align:right;margin-right:16px;user-select:none;font-size:12px}

/* ANSWER */
.answer-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:12px}
.answer-label{font-size:12px;color:var(--blue);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.answer-input{width:100%;background:#06080d;border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;resize:none;min-height:48px;outline:none;transition:border-color .2s}
.answer-input:focus{border-color:var(--blue)}.answer-input::placeholder{color:#334155}
.submit-row{display:flex;justify-content:space-between;align-items:center;margin-top:12px}

.submit-btn:disabled{background:var(--border);color:var(--dim);cursor:default}
.skip-btn{padding:10px 20px;border-radius:10px;background:transparent;border:1px solid var(--border);color:var(--muted);font-weight:600;font-size:13px}

/* TERMINAL */
.terminal{border-radius:12px;border:1px solid var(--border);overflow:hidden;margin-bottom:12px;transition:border-color .5s}
.terminal.revealed{border-color:rgba(34,197,94,.3)}
.terminal-bar{background:#0a0c10;padding:6px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.terminal-bar span{font-size:11px;color:var(--dim);font-family:'JetBrains Mono',monospace}
.terminal-body{background:#06080d;padding:14px 20px;min-height:60px;font-family:'JetBrains Mono',monospace;font-size:13px}
.terminal-cmd{color:var(--dim);font-size:11px;margin-bottom:6px}
.terminal-out{color:#4ade80;font-weight:500}

/* RESULT */
.result-card{border-radius:12px;overflow:hidden;margin-bottom:12px;animation:fadeUp .4s ease-out}
.result-correct{background:#071a0e;border:1px solid #166534}
.result-wrong{background:#1a0b0b;border:1px solid #991b1b}
.result-skip{background:var(--surface);border:1px solid var(--border)}
.result-header{padding:14px 20px;display:flex;align-items:center;gap:10px;font-weight:700;font-size:14px}
.result-correct .result-header{color:#4ade80}.result-wrong .result-header{color:#f87171}.result-skip .result-header{color:var(--yellow)}
.result-body{padding:0 20px 16px}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.result-col label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin-bottom:6px;font-weight:600}
.result-col pre{background:#06080d;border-radius:8px;padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text);white-space:pre-wrap;border:1px solid var(--border)}
.result-why{font-size:13px;color:#cbd5e1;line-height:1.6}.result-why strong{color:var(--blue)}

/* PROGRESS DOTS */
.progress-dots{display:flex;gap:4px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.pdot{height:8px;border-radius:4px;border:none;transition:all .3s;cursor:pointer}
.pdot.current{width:24px;background:var(--blue)}
.pdot.ok{width:8px;background:var(--green)}
.pdot.wrong{width:8px;background:var(--red)}
.pdot.skip{width:8px;background:var(--yellow)}
.pdot.pending{width:8px;background:var(--border)}

/* NEXT BTN */
.next-btn{padding:10px 32px;border-radius:10px;background:linear-gradient(135deg,#4f8ef7,#8b5cf6);color:#fff;font-weight:700;font-size:14px;border:none;box-shadow:0 0 20px rgba(79,142,247,.2)}

/* COMPLETION */
.completion{text-align:center;padding:60px 24px;animation:fadeUp .6s ease-out}
.completion h2{font-size:28px;font-weight:800;margin-bottom:8px;letter-spacing:-.03em}
.score-ring{width:140px;height:140px;border-radius:50%;margin:0 auto 24px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-size:40px;font-weight:800;line-height:1}.ring-lbl{font-size:12px;color:var(--muted)}
.grade-badge{display:inline-block;padding:8px 24px;border-radius:10px;font-weight:700;font-size:16px;margin-bottom:28px}
.score-bk{display:flex;gap:36px;justify-content:center;margin-bottom:40px}
.score-bk .si .v{font-size:26px;font-weight:800}.score-bk .si .d{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em}
.restart-btn{padding:12px 36px;border-radius:10px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-weight:600;font-size:14px}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}
.spinner{width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--muted);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:600px){.result-grid{grid-template-columns:1fr}.stat-row{gap:16px}.main{padding:12px 14px}.tabs{padding:10px 12px}}
</style>

<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useRef}=React;

const questions=[

// ══════════════════════════════════════════════════════
// PART A — React + TypeScript  (6 Qs)
// ══════════════════════════════════════════════════════

{part:"A",cat:"React + TypeScript",diff:"Easy",
code:`// Zustand store for a financial dashboard:
const useMarketStore = create<MarketState>((set) => ({
  prices: {},
  updatePrice: (ticker: string, price: number) =>
    set((state) => ({
      prices: { ...state.prices, [ticker]: price }
    })),
}));

// Component consuming it:
const TickerCard = ({ ticker }: { ticker: string }) => {
  const price = useMarketStore((s) => s.prices[ticker]);
  return <div>{ticker}: {price}</div>;
};

// Why does TickerCard NOT re-render when an
// unrelated ticker price updates?

A) Zustand uses React Context which batches updates automatically

B) The selector (s) => s.prices[ticker] returns a stable primitive —
   Zustand only triggers re-render when the selected value changes

C) TickerCard is wrapped in React.memo internally by Zustand

D) Zustand uses a Web Worker to isolate state updates per subscriber`,
output:`B) Selector returns a stable primitive

Zustand compares previous vs next selected value.
If s.prices["AAPL"] didn't change, TickerCard
for "AAPL" skips re-render — even if "MSFT" updated.`,
why:`Zustand's selector-based subscription is the key performance feature. The component passes a selector function (s) => s.prices[ticker] which extracts one value. Zustand compares the previous and next return value using Object.is() (strict equality). If your ticker's price didn't change, the component is not re-rendered — regardless of how many other tickers updated. This is why granular selectors matter: useMarketStore(s => s) would re-render on every store change.`},

{part:"A",cat:"React + TypeScript",diff:"Medium",
code:`// SWR fetching real-time stock data:
const { data, error, isLoading } = useSWR(
  '/api/market/snapshot',
  fetcher,
  { refreshInterval: 5000 }
);

// Vs TanStack Query:
const { data } = useQuery({
  queryKey: ['market-snapshot'],
  queryFn: fetchSnapshot,
  refetchInterval: 5000,
  staleTime: 4000,   // ← What does staleTime do here?
});

A) staleTime: 4000 delays the first fetch by 4 seconds

B) For 4 seconds after a fetch, cached data is considered fresh —
   subsequent mounts won't trigger a refetch within that window

C) Data older than 4 seconds is deleted from the cache automatically

D) staleTime disables refetchInterval for the first 4000ms`,
output:`B) staleTime = freshness window

For 4s after fetching, new component mounts
reuse cached data without re-fetching.
After 4s the data is "stale" — refetch triggers.`,
why:`staleTime controls how long TanStack Query considers cached data "fresh." During this window, a new component mounting with the same queryKey reuses the cache without a background refetch — preventing duplicate API calls when multiple components need the same data. Since refreshInterval is 5000ms and staleTime is 4000ms, data goes stale just before the next scheduled refetch. SWR has an equivalent: dedupingInterval. This distinction is critical for financial dashboards where you balance freshness vs. API rate limits.`},

{part:"A",cat:"React + TypeScript",diff:"Medium",
code:`// You migrated Angular's stock analytics app to React.
// This component causes memory leaks in production:

function RealtimePriceChart({ ticker }) {
  const [prices, setPrices] = useState([]);

  useEffect(() => {
    const socket = new WebSocket(\`wss://feed/\${ticker}\`);

    socket.onmessage = (e) => {
      const price = JSON.parse(e.data);
      setPrices(prev => [...prev, price]);  // ← Bug 1
    };
    // ← Bug 2 is here (missing)
  }, [ticker]);

  return <Chart data={prices}/>;
}

// Which option correctly identifies BOTH bugs?

A) Bug 1: spread creates new array on every tick (use push).
   Bug 2: no dependency on prices causes stale closure.

B) Bug 1: unbounded array growth — prices grows forever at 60fps.
   Bug 2: WebSocket is never closed — new socket opens on
   ticker change, old one stays open. Memory leak.

C) Bug 1: setPrices causes synchronous re-renders.
   Bug 2: useEffect needs [ticker, prices] as dependencies.

D) Bug 1: JSON.parse is synchronous and blocks UI.
   Bug 2: WebSocket needs a try-catch wrapper.`,
output:`B) — Both bugs correctly identified:
1. prices array grows unbounded (60fps × minutes)
2. WebSocket never closed → multiple open connections

Fix 1: keep only last N prices (sliding window)
Fix 2: return () => socket.close() from useEffect`,
why:`Bug 1: Real-time financial feeds push 60+ messages/second. [...prev, price] appends forever — the prices array becomes thousands of entries, causing continuous heap growth and chart render slowdowns. Fix: keep a sliding window — setPrices(prev => [...prev.slice(-200), price]). Bug 2: The useEffect has no cleanup function. When ticker changes, React re-runs the effect (opening a new WebSocket) but the old socket remains open, streaming data to a stale closure. Fix: return () => socket.close(). Given Siraj worked on 20-30s iframe rendering delays at Rakuten and memory leaks at Paxcom, this pattern should be deeply familiar.`},

{part:"A",cat:"React + TypeScript",diff:"Hard",
code:`// TypeScript discriminated union for chart state:
type ChartState<T> =
  | { status: 'idle' }
  | { status: 'loading' }
  | { status: 'success'; data: T; lastUpdated: Date }
  | { status: 'error';   error: Error; retryCount: number };

function useChartData<T>(url: string): ChartState<T> { /* ... */ }

// Usage:
const state = useChartData<PricePoint[]>('/api/prices');

// Which render pattern is MOST type-safe?

A) if (state.data) { return <Chart data={state.data}/> }
   // TypeScript infers state.data may exist

B) if (state.status === 'success') {
     return <Chart data={state.data} />
   }
   // TypeScript narrows to success branch — data: T guaranteed

C) return <Chart data={state.data ?? []} />
   // Nullish coalescing handles all states

D) const data = state as Extract<typeof state, {status:'success'}>;
   return <Chart data={data.data} />`,
output:`B) Discriminated union narrowing

Inside status === 'success' block, TypeScript
knows data: PricePoint[] exists. A fails:
state.data doesn't exist on idle/loading/error.`,
why:`A discriminated union uses the status property as the discriminant. TypeScript narrows the type inside the conditional: inside if (state.status === 'success'), the type is { status: 'success'; data: T; lastUpdated: Date } — data is guaranteed to exist and correctly typed. Option A fails at compile time: the 'idle', 'loading', and 'error' variants don't have a data property, so state.data is a type error outside a narrowed branch. Option D uses a type assertion — unsafe, bypasses type checking. This pattern is the correct way to model async states in TypeScript.`},

{part:"A",cat:"React + TypeScript",diff:"Medium",
code:`// You're building a modular charting library.
// A LineChart needs axes, tooltips, and legends
// as optional plug-in components.

// Which composition pattern is MOST flexible
// and avoids prop drilling?

A) Pass all config as a single giant config prop:
   <LineChart config={{ axes: {...}, tooltip: {...} }} />

B) Compound components with React Context:
   <Chart data={data}>
     <Chart.XAxis />
     <Chart.YAxis label="Price" />
     <Chart.Tooltip formatter={formatPrice} />
     <Chart.Legend />
   </Chart>

C) Use a render prop for every sub-element:
   <LineChart renderAxis={() => <Axis/>}
              renderTooltip={() => <Tooltip/>} />

D) HOC — wrap each chart type:
   const LineWithAxes = withAxes(withTooltip(LineChart))`,
output:`B) Compound Component pattern

Chart shares state via Context — no prop drilling.
Consumers compose exactly what they need.
This is how Recharts, Radix, and D3-React libs work.`,
why:`Compound components (as used by Recharts, Radix UI, Headless UI) allow Chart to expose sub-components that implicitly share state via React Context — current zoom level, hovered data point, scale functions. Consumers assemble only what they need: an admin dashboard might add all four; a sparkline might use none. Option A creates a massive, hard-to-type prop object. Option C render-props cause callback hell. Option D HOC chains lose TypeScript generics and become unmaintainable. Siraj built a modular charting library at Paxcom — this is exactly the architectural decision he made.`},

{part:"A",cat:"React + TypeScript",diff:"Hard",
code:`// Next.js — your network visualization page:
// Large graph data (50,000 nodes) fetched server-side.

// Option A: Server Component
export default async function NetworkPage() {
  const graph = await fetchGraph(); // 2MB JSON
  return <NetworkViz data={graph} />;
}

// Option B: Client Component with SWR
'use client';
export default function NetworkPage() {
  const { data } = useSWR('/api/graph', fetcher);
  return <NetworkViz data={data} />;
}

// For a network viz that needs WebGL (PixiJS) and
// real-time updates via WebSocket — which is correct?

A) Option A — server components are always faster

B) Option B — PixiJS needs browser APIs (canvas/WebGL).
   Server Components can't use browser APIs or hooks.
   Real-time WebSocket also requires client-side code.

C) Option A with 'use server' directive on NetworkViz

D) Split: server fetches initial snapshot, passes to
   a client boundary for WebGL rendering and WS updates`,
output:`D) Split: Server → initial data → Client boundary

Server Component fetches 2MB graph (no client JS).
Client boundary (NetworkViz) handles PixiJS + WebSocket.
Best of both: fast initial load + real-time interactivity.`,
why:`Option B is partially correct — PixiJS absolutely requires browser APIs (canvas, WebGL context). But option D is the production pattern: the Server Component fetches the initial graph data (avoiding a client-side waterfall), serializes it, and passes it as props to a 'use client' boundary component. NetworkViz (the PixiJS WebGL renderer) lives in the client boundary and sets up WebSocket subscriptions after hydration. This is Next.js's recommended "Server Component shell + Client leaf" architecture. Siraj's background building PixiJS visualizations makes this a relevant real-world scenario.`},

// ══════════════════════════════════════════════════════
// PART B — Data Visualization: D3 + WebGL  (6 Qs)
// ══════════════════════════════════════════════════════

{part:"B",cat:"Data Visualization",diff:"Easy",
code:`// D3 scale for a stock price chart:
const yScale = d3.scaleLinear()
  .domain([minPrice, maxPrice])
  .range([height, 0]);  // ← Why is range [height, 0] not [0, height]?

A) SVG bug — D3 requires inverted range to render correctly

B) SVG Y-axis is inverted: Y=0 is at the TOP of the SVG.
   [height, 0] maps high prices to low pixel Y (near top)
   and low prices to high pixel Y (near bottom) — correct!

C) D3 automatically corrects the inversion so order doesn't matter

D) range [0, height] would work the same way`,
output:`B) SVG coordinate system is top-down

SVG Y=0 is at top. To put high price near top
of chart, high price domain → low Y pixel value.
range [height, 0] achieves this inversion.`,
why:`This is the most common D3 confusion point. In SVG, the origin (0,0) is the top-left corner, and Y increases downward. So Y=0 is the top of the chart. A stock price of $200 should appear near the top — meaning a low pixel Y value. With range [height, 0]: minPrice maps to height (bottom of chart) and maxPrice maps to 0 (top of chart). If you accidentally use [0, height], high prices appear at the bottom and low prices at the top — a flipped chart. Every D3 price chart inverts the Y range.`},

{part:"B",cat:"Data Visualization",diff:"Medium",
code:`// 50,000 data points on a scatter plot.
// D3 SVG approach is too slow (browser freezes).

// Option A: D3 + SVG
svg.selectAll('circle')
   .data(points)
   .join('circle')
   .attr('cx', d => xScale(d.x))

    const pct=Math.round((totalOk/questions.length)*100);
    const grade=pct>=82?"Strong Hire":pct>=64?"Proceed — Round 2":pct>=45?"Needs Improvement":"Below Expectations";
    const gc=pct>=82?"#22c55e":pct>=64?"#f59e0b":pct>=45?"#fb923c":"#ef4444";
    return(
      <div className="completion">
        <div className="score-ring" style={{border:`4px solid ${gc}`,boxShadow:`0 0 40px ${gc}20`}}>
          <div className="ring-pct" style={{color:gc}}>{pct}%</div>
          <div className="ring-lbl">Score</div>
        </div>
        <h2>Assessment Complete!</h2>
        <p>{name} · {fmt(elapsed)}</p>
        <div className="grade-badge" style={{background:`${gc}18`,border:`1px solid ${gc}40`,color:gc}}>{grade}</div>
        <div className="score-bk">
          <div className="si"><div className="v" style={{color:"#4ade80"}}>{totalOk}</div><div className="d">Correct</div></div>
          <div className="si"><div className="v" style={{color:"#f87171"}}>{totalWrong}</div><div className="d">Wrong</div></div>
          <div className="si"><div className="v" style={{color:"#fbbf24"}}>{totalSkip}</div><div className="d">Skipped</div></div>
        </div>
        <button className="restart-btn" onClick={()=>{setStarted(false);setActivePart("A");setIdx(0);setAnswers({});setSubmitted({});setFinished(false);setTypingKey(null);setTyped("");setName("");}}>Restart</button>
      </div>
    );
  }

  return(
    <div>
      <div className="header">
        <div className="header-left">
          <div className="header-icon">📊</div>
          <div>
            <div className="header-title">Frontend Assessment — Siraj Sharma</div>
            <div className="header-sub">{name} · {fmt(elapsed)}</div>
          </div>
        </div>
        <div className="score-pills">
          <div className="pill pill-green">✓ {totalOk}</div>
          <div className="pill pill-red">✗ {totalWrong}</div>
          <div className="pill pill-total">{totalAnswered}/{questions.length}</div>
        </div>
      </div>

      <div className="tabs">
        {PARTS.map(p=>{
          const qs=questions.filter(q2=>q2.part===p.key);
          const done=qs.filter(q2=>submitted[questions.indexOf(q2)]!==undefined).length;
          return(
            <button key={p.key} className={`tab ${activePart===p.key?"active":""}`}
              style={{"--tab-color":p.color}} onClick={()=>setActivePart(p.key)}>
              <span>{p.icon}</span>{p.label}<span className="tab-badge">{done}/{qs.length}</span>
            </button>
          );
        })}
      </div>

      <div className="main">
        <div className="q-header">
          <div className="q-header-left">
            <span className="q-num">Q{idx+1}/{filtered.length}</span>
            <span className="diff-badge" style={{color:diffColor[q.diff],background:`${diffColor[q.diff]}18`,border:`1px solid ${diffColor[q.diff]}30`}}>{q.diff}</span>
            <span className="q-hint">Type A · B · C · D</span>
          </div>
          <div className="nav-btns">
            <button className="nav-btn" onClick={()=>{setIdx(i=>i-1);setTypingKey(null);setTyped("");}} disabled={idx===0}>←</button>
            <button className="nav-btn" onClick={handleNext} disabled={!isSubmitted}>→</button>
          </div>
        </div>

        <div className="editor">
          <div className="editor-bar">
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div className="dots">
                <div className="dot" style={{background:"#ef4444"}}/>
                <div className="dot" style={{background:"#f59e0b"}}/>
                <div className="dot" style={{background:"#22c55e"}}/>
              </div>
              <span className="filename">question_{String(gi+1).padStart(2,"0")}.ts</span>
            </div>
            <span className="lang-pill" style={{color:part?.color,background:`${part?.color}18`,border:`1px solid ${part?.color}30`}}>{q.cat.toUpperCase()}</span>
          </div>
          <div className="code-body">
            {q.code.split("\n").map((line,i)=>(
              <div className="code-line" key={i}>
                <span className="line-no">{i+1}</span>
                <span style={{color:"#e2e8f0",whiteSpace:"pre-wrap"}}>{line}</span>
              </div>
            ))}
          </div>
        </div>

        {!isSubmitted&&(
          <div className="answer-box">
            <div className="answer-label">Your Answer</div>
            <textarea ref={inputRef} className="answer-input" value={input} onChange={e=>setInput(e.target.value)}
              placeholder="Type A, B, C, or D..."
              onKeyDown={e=>{ if(e.key==="Enter"&&!e.shiftKey&&input.trim()){ e.preventDefault(); handleSubmit(false); } }}
              style={{minHeight:"48px",resize:"none"}}
            />
            <div className="submit-row">
              <button className="skip-btn" onClick={()=>handleSubmit(true)}>Skip →</button>
              <button className="submit-btn" onClick={()=>handleSubmit(false)} disabled={!input.trim()}>Submit Answer</button>
            </div>
          </div>
        )}

        {isSubmitted&&(<>
          <div className="terminal revealed">
            <div className="terminal-bar">
              <span>⬡ Result</span>
              <span style={{color:"#22c55e"}}>● evaluated</span>
            </div>
            <div className="terminal-body">
              <div className="terminal-cmd">$ assess --q{gi+1} --evaluate</div>
              {typed.split("\n").map((l,i)=><div className="terminal-out" key={i}>{l}</div>)}
            </div>
          </div>

          <div className={`result-card ${submitted[gi]==="ok"?"result-correct":submitted[gi]==="wrong"?"result-wrong":"result-skip"}`}>
            <div className="result-header">
              {submitted[gi]==="ok"&&"✓ Correct!"}
              {submitted[gi]==="wrong"&&"✗ Incorrect"}
              {submitted[gi]==="skip"&&"⏭ Skipped"}
            </div>
            <div className="result-body">
              {submitted[gi]!=="skip"?(
                <div className="result-grid">
                  <div className="result-col"><label>Your Answer</label><pre>{answers[gi]}</pre></div>
                  <div className="result-col"><label>Correct Answer</label><pre style={{borderColor:"#166534"}}>{q.output}</pre></div>
                </div>
              ):(
                <div className="result-grid" style={{gridTemplateColumns:"1fr"}}>
                  <div className="result-col"><label>Correct Answer</label><pre>{q.output}</pre></div>
                </div>
              )}
              <div className="result-why"><strong>Why: </strong>{q.why}</div>
            </div>
          </div>

          <div style={{textAlign:"center",marginTop:12}}>
            <button className="next-btn" onClick={handleNext}>
              {idx<filtered.length-1?"Next Question →":PARTS.findIndex(p=>p.key===activePart)<PARTS.length-1?"Next Section →":"Finish →"}
            </button>
          </div>
        </>)}

        <div className="progress-dots">
          {filtered.map((fq,i)=>{
            const fgi=questions.indexOf(fq);
            const st=submitted[fgi];
            const cls=`pdot ${i===idx?"current":st==="ok"?"ok":st==="wrong"?"wrong":st==="skip"?"skip":"pending"}`;
            return <button key={i} className={cls} onClick={()=>{setIdx(i);setTypingKey(null);setTyped("");}}/>;
          })}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
