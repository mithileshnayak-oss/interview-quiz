<script type="text/babel">
const{useState,useEffect,useRef}=React;
const questions=[
// Part A: React.js (10 Qs - Primary skill, heavy)
{part:"A",cat:"React.js",lang:"javascript",diff:"Easy",code:`function App() {\n  const [count, setCount] = useState(0);\n  const handleClick = () => {\n    setCount(count + 1);\n    setCount(count + 1);\n    setCount(count + 1);\n  };\n  return <p>{count}</p>;\n  // After one click?\n}`,output:`1 (not 3)`,why:`React batches state updates. All three calls see the same stale closure value (count=0). Each sets 0+1=1. Fix: use functional updater setCount(c => c+1) to chain: 0\u21921\u21922\u21923.`},

{part:"A",cat:"React.js",lang:"javascript",diff:"Easy",code:`function App() {\n  const [count, setCount] = useState(0);\n  useEffect(() => {\n    console.log("effect:", count);\n  });\n  console.log("render:", count);\n  return <p>{count}</p>;\n}\n// On initial render:`,output:`"render: 0"\n"effect: 0"`,why:`Component body (render) executes synchronously first. useEffect runs asynchronously AFTER the browser paints. So render log always comes before effect log.`},

{part:"A",cat:"React.js",lang:"javascript",diff:"Medium",code:`function App() {\n  const [count, setCount] = useState(0);\n  useEffect(() => {\n    console.log("mount");\n    return () => console.log("cleanup");\n  }, [count]);\n  // When count changes 0 \u2192 1:\n}`,output:`"cleanup"  (previous effect)\n"mount"    (new effect)`,why:`When a useEffect dependency changes, React runs cleanup from the PREVIOUS effect first, then runs the new effect. This prevents stale closures and memory leaks.`},

{part:"A",cat:"React.js",lang:"javascript",diff:"Medium",code:`const MemoChild = React.memo(function Child({ onClick }) {\n  console.log("Child render");\n  return <button onClick={onClick}>Click</button>;\n});\n\nfunction Parent() {\n  const [count, setCount] = useState(0);\n  const handleClick = () => setCount(c => c + 1);\n  return (\n    <>\n      <MemoChild onClick={handleClick} />\n      <p>{count}</p>\n    </>\n  );\n}\n// Does Child re-render when count changes?`,output:`YES \u2014 Child re-renders every time!\nReact.memo fails here.`,why:`handleClick is recreated on every Parent render (new function reference). React.memo does shallow comparison and sees a "new" onClick prop. Fix: wrap handleClick in useCallback(() => setCount(c=>c+1), []).`},

{part:"A",cat:"React.js",lang:"javascript",diff:"Medium",code:`function App() {\n  const [items, setItems] = useState([\n    { id: 1, name: "A" },\n    { id: 2, name: "B" },\n    { id: 3, name: "C" }\n  ]);\n\n  const remove = (id) => {\n    setItems(items.filter(i => i.id !== id));\n  };\n\n  return items.map(item => (\n    <div key={item.id}>\n      {item.name}\n      <button onClick={() => remove(item.id)}>X</button>\n    </div>\n  ));\n}\n// Click X on "B". What remains?`,output:`A\nC\n(B is removed, key={item.id} ensures\ncorrect DOM reconciliation)`,why:`filter creates a new array excluding id=2. key={item.id} is stable and unique, so React correctly identifies which DOM node to remove. Using index as key here would cause subtle bugs when items are removed from the middle.`},

{part:"A",cat:"React.js",lang:"javascript",diff:"Hard",code:`// Redux pattern\nconst initialState = { count: 0 };\n\nfunction reducer(state = initialState, action) {\n  switch (action.type) {\n    case "INCREMENT":\n      return { ...state, count: state.count + 1 };\n    case "ADD":\n      return { ...state, count: state.count + action.payload };\n    case "RESET":\n      return initialState;\n    default:\n      return state;\n  }\n}\n\n// Dispatched in order:\n// { type: "INCREMENT" }\n// { type: "ADD", payload: 5 }\n// { type: "INCREMENT" }\n// { type: "ADD", payload: 3 }\n// Final state.count?`,output:`10`,why:`Start: 0. INCREMENT: 0+1=1. ADD 5: 1+5=6. INCREMENT: 6+1=7. ADD 3: 7+3=10. Each action returns a NEW state object via spread (immutable update). This is classic Redux reducer pattern with action types and payloads.`},

{part:"A",cat:"React.js",lang:"javascript",diff:"Hard",code:`function useDebounce(value, delay) {\n  const [debouncedValue, setDebouncedValue] = useState(value);\n\n  useEffect(() => {\n    const timer = setTimeout(() => {\n      setDebouncedValue(value);\n    }, delay);\n    return () => clearTimeout(timer);\n  }, [value, delay]);\n\n  return debouncedValue;\n}\n\n// User types "a", "ab", "abc" within 300ms\n// delay = 500ms\n// How many times does debouncedValue update?`,output:`Only ONCE \u2014 with final value "abc"\nafter 500ms of no typing.`,why:`Each keystroke triggers useEffect. The cleanup (clearTimeout) cancels the previous timer. Only the LAST timer survives (500ms after "abc"). This is the standard debounce hook \u2014 used for search-as-you-type to avoid excessive API calls. Suraj\u2019s Paytm Money stock search likely uses this.`},

{part:"A",cat:"React.js",lang:"javascript",diff:"Hard",code:`function App() {\n  const renderCount = useRef(0);\n  const [name, setName] = useState("");\n\n  renderCount.current++;\n\n  return (\n    <div>\n      <input value={name}\n        onChange={e => setName(e.target.value)} />\n      <p>Renders: {renderCount.current}</p>\n    </div>\n  );\n}\n// User types "abc" (3 keystrokes):`,output:`Renders: 4\n(1 initial + 3 keystrokes = 4 renders)`,why:`useRef persists across renders WITHOUT causing re-renders. renderCount.current++ runs on every render. Initial render = 1. Each keystroke triggers setState \u2192 re-render: 2, 3, 4. useRef is the correct way to track render counts (useState would cause infinite loop).`},

{part:"A",cat:"React.js",lang:"javascript",diff:"Hard",code:`const ThemeContext = React.createContext("light");\n\nfunction App() {\n  return (\n    <ThemeContext.Provider value="dark">\n      <Parent />\n    </ThemeContext.Provider>\n  );\n}\n\nfunction Parent() {\n  return <Child />;\n}\n\nfunction Child() {\n  const theme = useContext(ThemeContext);\n  console.log(theme);\n  return <p>{theme}</p>;\n}\n// What logs?`,output:`"dark"`,why:`Context provides data without prop drilling. Provider wraps the tree with value="dark". Child uses useContext(ThemeContext) to read the nearest Provider\u2019s value. Even though Parent doesn\u2019t pass any props, Child gets "dark" directly from the Provider. Default "light" is only used when no Provider exists above.`},

{part:"A",cat:"React.js",lang:"javascript",diff:"Hard",code:`// Paytm Money: Stock favorites feature\nfunction useFavorites() {\n  const [favs, setFavs] = useState(() => {\n    const saved = localStorage.getItem("favorites");\n    return saved ? JSON.parse(saved) : [];\n  });\n\n  useEffect(() => {\n    localStorage.setItem("favorites", JSON.stringify(favs));\n  }, [favs]);\n\n  const toggle = (stockId) => {\n    setFavs(prev =>\n      prev.includes(stockId)\n        ? prev.filter(id => id !== stockId)\n        : [...prev, stockId]\n    );\n  };\n  return { favs, toggle };\n}\n// toggle("RELIANCE") called twice:`,output:`First call: favs = ["RELIANCE"]\nSecond call: favs = []\n(toggles on then off)`,why:`Lazy initializer (useState callback) reads localStorage once on mount. toggle checks if stockId exists: if yes, remove (filter); if no, add (spread + append). Calling twice: add RELIANCE \u2192 remove RELIANCE. useEffect syncs to localStorage on every change. This is a real-world pattern for Suraj\u2019s Paytm Money favorites feature.`},

// Part B: Next.js (4 Qs)
{part:"B",cat:"Next.js",lang:"javascript",diff:"Easy",code:`// pages/stocks/[symbol].js (Next.js)\nexport async function getServerSideProps({ params }) {\n  const res = await fetch(\n    \`https://api.example.com/stocks/\${params.symbol}\`\n  );\n  const stock = await res.json();\n  return { props: { stock } };\n}\n\nexport default function StockPage({ stock }) {\n  return <h1>{stock.name}: \u20b9{stock.price}</h1>;\n}\n\n// URL: /stocks/RELIANCE`,output:`Server fetches stock data for "RELIANCE"\nbefore sending HTML to browser.\nPage renders: "Reliance Industries: \u20b92,450"`,why:`getServerSideProps runs on the SERVER on every request. params.symbol = "RELIANCE" from the dynamic route. Data is fetched server-side, then passed as props to the component. The user receives fully rendered HTML (good for SEO, no loading spinner).`},

{part:"B",cat:"Next.js",lang:"javascript",diff:"Medium",code:`// Next.js rendering comparison:\n//\n// Page A: getServerSideProps (SSR)\n// Page B: getStaticProps (SSG)\n// Page C: useEffect + fetch (CSR)\n//\n// For Paytm Money, which rendering\n// strategy for each page?\n//\n// 1. Stock detail page (live price)\n// 2. "About Us" page\n// 3. User's portfolio dashboard`,output:`1. Stock detail \u2192 SSR or CSR\n   (prices change constantly)\n2. About Us \u2192 SSG\n   (static, rarely changes)\n3. Portfolio \u2192 CSR\n   (user-specific, needs auth token)`,why:`SSG (getStaticProps) for pages that don\u2019t change often \u2014 built at deploy time. SSR (getServerSideProps) for pages needing fresh data on every request. CSR (useEffect) for user-specific data after auth. Live stock prices could be SSR (fresh on load) + CSR websocket for real-time updates.`},

{part:"B",cat:"Next.js",lang:"javascript",diff:"Hard",code:`// Next.js API route\n// pages/api/sip/book.js\n\nexport default async function handler(req, res) {\n  if (req.method !== "POST")\n    return res.status(405).json({ error: "Method not allowed" });\n\n  const { stockId, amount, frequency } = req.body;\n\n  if (!stockId || !amount || amount < 500)\n    return res.status(400).json({ error: "Invalid input" });\n\n  // ... book SIP logic\n  return res.status(201).json({ sipId: "SIP_001", status: "active" });\n}\n\n// POST /api/sip/book { stockId: "HDFC", amount: 100 }`,output:`HTTP 400\n{ "error": "Invalid input" }\n(amount 100 < minimum 500)`,why:`The handler validates: method must be POST (405 otherwise), stockId must exist, amount must be >= 500. amount=100 fails the amount < 500 check. This is real-world API validation for SIP booking in Paytm Money.`},

{part:"B",cat:"Next.js",lang:"javascript",diff:"Hard",code:`// Next.js middleware (middleware.js)\nimport { NextResponse } from "next/server";\n\nexport function middleware(request) {\n  const token = request.cookies.get("session");\n  const { pathname } = request.nextUrl;\n\n  if (pathname.startsWith("/api/"))\n    return NextResponse.next(); // skip API routes\n\n  if (!token && pathname !== "/login")\n    return NextResponse.redirect(new URL("/login", request.url));\n\n  if (token && pathname === "/login")\n    return NextResponse.redirect(new URL("/dashboard", request.url));\n\n  return NextResponse.next();\n}\n\n// No session cookie, visit /portfolio:`,output:`Redirected to /login\n(no token + not on /login page)`,why:`Middleware runs at the edge BEFORE page renders. Logic: skip API routes, redirect unauthenticated users to /login, redirect already-logged-in users away from /login to /dashboard. No cookie + /portfolio \u2192 redirect to /login. This is standard auth middleware for protected routes.`},

// Part C: TypeScript (4 Qs)
{part:"C",cat:"TypeScript",lang:"typescript",diff:"Easy",code:`interface Stock {\n  symbol: string;\n  price: number;\n  change?: number;\n}\n\nconst stock: Stock = { symbol: "TCS", price: 3500 };\nconsole.log(stock.change);`,output:`undefined`,why:`change is optional (?) so it can be omitted. Accessing an omitted optional property returns undefined \u2014 no compile or runtime error.`},

{part:"C",cat:"TypeScript",lang:"typescript",diff:"Medium",code:`type OrderType = "market" | "limit" | "stop";\n\nfunction placeOrder(type: OrderType, price?: number) {\n  if (type === "market") return "Executed at market price";\n  if (!price) return "Price required for " + type;\n  return \`\${type} order at \u20b9\${price}\`;\n}\n\nconsole.log(placeOrder("market"));\nconsole.log(placeOrder("limit"));\nconsole.log(placeOrder("limit", 1500));`,output:`"Executed at market price"\n"Price required for limit"\n"limit order at \u20b91500"`,why:`Union type restricts OrderType to 3 values. Market orders don\u2019t need price. Limit/stop orders require price \u2014 if missing, return error message. placeOrder("invalid") would cause a compile error. This models real stock order types from Paytm Money.`},

{part:"C",cat:"TypeScript",lang:"typescript",diff:"Hard",code:`type ApiResponse<T> = {\n  data: T;\n  status: "success" | "error";\n  message?: string;\n};\n\nconst res: ApiResponse<Stock[]> = {\n  data: [\n    { symbol: "RELIANCE", price: 2450 },\n    { symbol: "TCS", price: 3500 }\n  ],\n  status: "success"\n};\n\nconsole.log(res.data.length);\nconsole.log(res.data[0].symbol);`,output:`2\n"RELIANCE"`,why:`Generic interface ApiResponse<T> types the data field. When T = Stock[], data is an array of Stock objects. Full type safety: .length works on array, .symbol works on Stock. This is the standard API response wrapper pattern used across MERN backends.`},

{part:"C",cat:"TypeScript",lang:"typescript",diff:"Hard",code:`// Utility types\n\ninterface User {\n  id: number;\n  name: string;\n  email: string;\n  password: string;\n}\n\ntype PublicUser = Omit<User, "password">;\ntype LoginForm = Pick<User, "email" | "password">;\ntype UpdateUser = Partial<Omit<User, "id">>;\n\n// Which fields does each type have?`,output:`PublicUser: { id, name, email }\nLoginForm: { email, password }\nUpdateUser: { name?, email?, password? }\n(all optional, no id)`,why:`Omit removes specified keys. Pick selects specified keys. Partial makes all keys optional. Chaining: Omit<User,"id"> removes id, Partial makes rest optional. These utility types are essential for typing API request/response shapes without duplicating interfaces.`},

// Part D: JavaScript Core (6 Qs)
{part:"D",cat:"JavaScript",lang:"javascript",diff:"Easy",code:`console.log(typeof null);\nconsole.log(typeof undefined);\nconsole.log(null == undefined);\nconsole.log(null === undefined);`,output:`"object"\n"undefined"\ntrue\nfalse`,why:`typeof null is "object" (famous JS bug since v1). null == undefined is true (loose equality). null === undefined is false (different types). Senior devs must know this \u2014 8+ years means no excuses.`},

{part:"D",cat:"JavaScript",lang:"javascript",diff:"Medium",code:`const promise1 = Promise.resolve("A");\nconst promise2 = new Promise(res =>\n  setTimeout(() => res("B"), 100));\nconst promise3 = Promise.resolve("C");\n\nPromise.all([promise1, promise2, promise3])\n  .then(results => console.log(results));`,output:`["A", "B", "C"]\n(after 100ms, preserves order)`,why:`Promise.all waits for ALL promises and returns results in ORDER (not completion order). promise2 takes 100ms but its result still appears at index 1. If ANY rejects, the entire Promise.all rejects. Use Promise.allSettled to get all results regardless.`},

{part:"D",cat:"JavaScript",lang:"javascript",diff:"Medium",code:`console.log("start");\nsetTimeout(() => console.log("timeout"), 0);\nPromise.resolve().then(() => console.log("promise"));\nconsole.log("end");`,output:`"start"\n"end"\n"promise"\n"timeout"`,why:`Sync code first (start, end). Microtasks (Promise.then) execute before macrotasks (setTimeout). Even 0ms setTimeout waits for microtask queue to drain. A senior MERN developer with 8 years MUST know event loop ordering.`},

{part:"D",cat:"JavaScript",lang:"javascript",diff:"Hard",code:`const obj = { a: 1, b: { c: 2 } };\nconst shallow = { ...obj };\nconst deep = JSON.parse(JSON.stringify(obj));\n\nshallow.b.c = 99;\nconsole.log(obj.b.c);\n\ndeep.b.c = 42;\nconsole.log(obj.b.c);`,output:`99\n99`,why:`Spread creates a SHALLOW copy \u2014 nested objects share references. shallow.b === obj.b (same object). So shallow.b.c = 99 also changes obj.b.c. JSON parse/stringify creates a DEEP copy \u2014 but by this point obj.b.c is already 99 (from the shallow mutation). deep.b.c = 42 doesn\u2019t affect obj.`},

{part:"D",cat:"JavaScript",lang:"javascript",diff:"Hard",code:`async function fetchStocks() {\n  console.log("1");\n  const res = await fetch("/api/stocks");\n  console.log("2");\n  const data = await res.json();\n  console.log("3");\n  return data;\n}\n\nconsole.log("A");\nfetchStocks().then(() => console.log("B"));\nconsole.log("C");`,output:`"A"\n"1"\n"C"\n"2"\n"3"\n"B"`,why:`A is sync. fetchStocks() starts: "1" (sync inside async). await yields \u2192 "C" runs. After fetch resolves: "2". After res.json() resolves: "3". .then fires: "B". This tests deep understanding of async/await execution order.`},

{part:"D",cat:"JavaScript",lang:"javascript",diff:"Hard",code:`// Closure + setTimeout (classic)\nfor (var i = 0; i < 3; i++) {\n  setTimeout(() => console.log("var:", i), 0);\n}\nfor (let j = 0; j < 3; j++) {\n  setTimeout(() => console.log("let:", j), 0);\n}`,output:`"var: 3"\n"var: 3"\n"var: 3"\n"let: 0"\n"let: 1"\n"let: 2"`,why:`var is function-scoped: all closures share the same i (3 after loop). let is block-scoped: each iteration creates a new j binding. A senior dev with 8 years should get this instantly.`},

// Part E: Node.js & Backend (4 Qs)
{part:"E",cat:"Node.js & Backend",lang:"javascript",diff:"Easy",code:`const express = require("express");\nconst app = express();\n\napp.use((req, res, next) => {\n  console.log("Middleware 1");\n  next();\n});\n\napp.use((req, res, next) => {\n  console.log("Middleware 2");\n  next();\n});\n\napp.get("/api/test", (req, res) => {\n  console.log("Handler");\n  res.json({ ok: true });\n});\n\n// GET /api/test logs:`,output:`"Middleware 1"\n"Middleware 2"\n"Handler"`,why:`Express middleware executes in ORDER of app.use() registration. Each calls next() to pass to the next middleware. Finally the route handler runs. If any middleware doesn\u2019t call next(), the request hangs. This is the middleware chain pattern.`},

{part:"E",cat:"Node.js & Backend",lang:"javascript",diff:"Medium",code:`// JWT Auth middleware\nconst jwt = require("jsonwebtoken");\n\nfunction authMiddleware(req, res, next) {\n  const token = req.headers.authorization?.split(" ")[1];\n  if (!token)\n    return res.status(401).json({ error: "No token" });\n  try {\n    const decoded = jwt.verify(token, process.env.SECRET);\n    req.user = decoded;\n    next();\n  } catch (err) {\n    res.status(403).json({ error: "Invalid token" });\n  }\n}\n\n// Request with expired token:`,output:`HTTP 403\n{ "error": "Invalid token" }\n(jwt.verify throws on expired token)`,why:`The middleware extracts Bearer token from Authorization header. jwt.verify checks signature AND expiry. An expired token causes verify to throw a JsonWebTokenError/TokenExpiredError, caught by the catch block \u2192 403. This is the standard JWT auth pattern Suraj implemented at Technomatz.`},

{part:"E",cat:"Node.js & Backend",lang:"javascript",diff:"Hard",code:`// MongoDB aggregation pipeline\ndb.transactions.aggregate([\n  { $match: { status: "completed" } },\n  { $group: {\n      _id: "$userId",\n      totalAmount: { $sum: "$amount" },\n      count: { $sum: 1 },\n      avgAmount: { $avg: "$amount" }\n  }},\n  { $sort: { totalAmount: -1 } },\n  { $limit: 5 }\n]);\n\n// What does this return?`,output:`Top 5 users by total completed transaction\namount, with count and average per user.\nSorted highest total first.`,why:`$match filters to completed transactions. $group aggregates by userId: total, count, average. $sort by totalAmount descending. $limit 5 returns top 5. This is the MongoDB equivalent of SQL GROUP BY + ORDER BY + LIMIT. Core skill for MERN backend work.`},

{part:"E",cat:"Node.js & Backend",lang:"javascript",diff:"Hard",code:`// WebSocket real-time pattern\nconst WebSocket = require("ws");\nconst wss = new WebSocket.Server({ port: 8080 });\n\nconst clients = new Set();\n\nwss.on("connection", (ws) => {\n  clients.add(ws);\n  console.log("connected:", clients.size);\n\n  ws.on("message", (data) => {\n    // Broadcast to all OTHER clients\n    clients.forEach(client => {\n      if (client !== ws && client.readyState === WebSocket.OPEN)\n        client.send(data);\n    });\n  });\n\n  ws.on("close", () => {\n    clients.delete(ws);\n    console.log("remaining:", clients.size);\n  });\n});\n\n// 3 clients connect. Client A sends "hello".\n// Who receives it?`,output:`Client B and Client C receive "hello".\nClient A does NOT receive its own message.\nclients.size = 3 after all connect.`,why:`Broadcasting pattern: iterate all clients, skip the sender (client !== ws), check readyState is OPEN. Set tracks connected clients, delete on close. This is the real-time pattern Suraj used for WebSocket features \u2014 live stock price feeds, chat, or collaboration.`},
];

function colorize(line,lang){
const kw=["const","let","var","function","return","if","else","new","typeof","import","export","class","extends","async","await","try","catch","throw","switch","case","default","break","for","of","from","type","interface","enum"];
const bi=["console","React","useState","useEffect","useRef","useContext","useCallback","useMemo","Promise","setTimeout","JSON","localStorage","WebSocket","require","process","module","exports","db","jwt","express","fetch"];
const mt=["log","stringify","parse","then","catch","map","filter","reduce","forEach","includes","push","splice","split","join","trim","resolve","reject","all","allSettled","verify","sign","use","get","post","json","status","send","next","add","delete","has","set","memo","createContext","getItem","setItem"];
const parts=[];
const re=/(@\w+(?:\([^)]*\))?|"(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'|`(?:[^`\\]|\\.)*`|\/\/.*$|\b\d+\.?\d*\b|true|false|null|undefined|\$\w+|\b[a-zA-Z_$][\w$]*\b|[^\s\w"'`]|\s+)/g;
let m,k=0;
while((m=re.exec(line))!==null){const t=m[0];let c="#e2e8f0";
if(/^@/.test(t))c="#c792ea";
else if(/^["'`]/.test(t))c="#a5d6a7";
else if(/^\/\//.test(t))c="#546e7a";
else if(/^\d/.test(t))c="#f48fb1";
else if(/^\$/.test(t))c="#ffcb6b";
else if(t==="true"||t==="false"||t==="null"||t==="undefined")c="#f48fb1";
else if(kw.includes(t))c="#c792ea";
else if(bi.includes(t))c="#82aaff";
else if(mt.includes(t))c="#ffcb6b";
else if(/^[(){}[\];,=<>!+\-*/%&|^~?:.]/.test(t))c="#89ddff";
parts.push(React.createElement("span",{key:k++,style:{color:c}},t))}
return parts.length?parts:line}

function App(){
const[started,setStarted]=useState(false);const[cn,setCn]=useState("");
const[ap,setAp]=useState("A");const[ci,setCi]=useState(0);
const[ans,setAns]=useState({});const[sub,setSub]=useState({});
const[iv,setIv]=useState("");const[tp,setTp]=useState(null);
const[tt,setTt]=useState("");const[fin,setFin]=useState(false);
const[el,setEl]=useState(0);const[st]=useState(Date.now());const ir=useRef(null);
const fl=questions.filter(q=>q.part===ap);const q=fl[ci];
const gi=questions.indexOf(q);const isSub=sub[gi]!==undefined;

useEffect(()=>{setCi(0)},[ap]);
useEffect(()=>{if(!started||fin)return;const t=setInterval(()=>setEl(Math.floor((Date.now()-st)/1000)),1000);return()=>clearInterval(t)},[started,fin]);
useEffect(()=>{if(tp===null)return;const o=q.output;let i=0;setTt("");const v=setInterval(()=>{i++;setTt(o.slice(0,i));if(i>=o.length)clearInterval(v)},18);return()=>clearInterval(v)},[tp]);
useEffect(()=>{if(!isSub&&ir.current)ir.current.focus()},[ci,ap,isSub]);

const hs=(sk)=>{const ua=sk?"(skipped)":iv.trim();setAns(a=>({...a,[gi]:ua}));const cr=!sk&&norm(ua)===norm(q.output);setSub(s=>({...s,[gi]:sk?"skip":cr?"correct":"wrong"}));setTp(Date.now());setIv("")};
const norm=(s)=>s.replace(/[\s"'`()]/g,"").toLowerCase().replace(/[^\w,.\-:=<>!&|+*/{}[\]%\u20b9]/g,"");
const hn=()=>{if(ci<fl.length-1){setCi(i=>i+1);setTp(null);setTt("")}else{const np=PARTS.findIndex(p=>p.key===ap);if(np<PARTS.length-1){setAp(PARTS[np+1].key);setTp(null);setTt("")}else{setFin(true)}}};
const hp=()=>{if(ci>0){setCi(i=>i-1);setTp(null);setTt("")}};
const ta=Object.keys(sub).length;const tc=Object.values(sub).filter(v=>v==="correct").length;const tw=Object.values(sub).filter(v=>v==="wrong").length;const ts=Object.values(sub).filter(v=>v==="skip").length;
const ft=(s)=>`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;

if(!started){return(
<div className="landing"><div className="landing-icon">{"\u269b\ufe0f"}</div>

<input value={cn} onChange={e=>setCn(e.target.value)} placeholder="Enter your name..." style={{padding:"12px 20px",borderRadius:10,border:"1px solid #1e293b",background:"#111827",color:"#e2e8f0",fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:14,width:280,textAlign:"center",marginBottom:16,outline:"none"}}/>
<br/><button className="start-btn" onClick={()=>setStarted(true)} disabled={!cn.trim()}>Start Assessment \u2192</button></div>)}

if(fin){const pct=Math.round((tc/questions.length)*100);const grade=pct>=83?"Strong":pct>=60?"Decent":pct>=40?"Needs Improvement":"Below Expectations";const gc=pct>=83?"#22c55e":pct>=60?"#f59e0b":pct>=40?"#fb923c":"#ef4444";
return(<div className="completion"><div className="score-circle" style={{border:`4px solid ${gc}`,boxShadow:`0 0 40px ${gc}20`}}><div className="pct" style={{color:gc}}>{pct}%</div><div className="lbl">Score</div></div>
<h2>Assessment Complete!</h2><p>{cn} \u00b7 Time: {ft(el)}</p>
<div style={{display:"inline-block",padding:"8px 24px",borderRadius:10,background:`${gc}18`,border:`1px solid ${gc}40`,color:gc,fontWeight:700,fontSize:16,marginBottom:24}}>{grade}</div>
<div className="score-breakdown"><div className="item"><div className="val" style={{color:"#4ade80"}}>{tc}</div><div className="desc">Correct</div></div><div className="item"><div className="val" style={{color:"#f87171"}}>{tw}</div><div className="desc">Wrong</div></div><div className="item"><div className="val" style={{color:"#fbbf24"}}>{ts}</div><div className="desc">Skipped</div></div></div>

return(<div>

<div className="score-pills"><div className="pill pill-green">{"\u2713"} {tc}</div><div className="pill pill-red">{"\u2717"} {tw}</div><div className="pill pill-total">{ta}/{questions.length}</div></div></div>
<div className="tabs">{PARTS.map(p=>{const c=questions.filter(q2=>q2.part===p.key).length;const d=questions.filter(q2=>q2.part===p.key).filter(q2=>sub[questions.indexOf(q2)]!==undefined).length;return(<button key={p.key} className={`tab ${ap===p.key?"active":""}`} style={{"--tab-color":p.color}} onClick={()=>setAp(p.key)}><span>{p.icon}</span> {p.label}<span className="tab-badge">{d}/{c}</span></button>)})}</div>
<div className="main">

<div className="code-body">{q.code.split("\n").map((line,i)=>(<div className="code-line" key={i}><span className="line-no">{i+1}</span><span>{colorize(line,q.lang)}</span></div>))}</div></div>
{!isSub&&(<div className="answer-section"><div className="answer-box"><div className="answer-label">Your Answer</div>

<div className="submit-row"><button className="skip-btn" onClick={()=>hs(true)}>Skip {"\u2192"}</button><button className="submit-btn" onClick={()=>hs(false)} disabled={!iv.trim()}>Submit Answer</button></div></div></div>)}
{isSub&&(<><div className="terminal revealed"><div className="terminal-bar"><span>{"\u2b22"} Output</span><span style={{color:"#22c55e"}}>{"\u25cf"} exit(0)</span></div>

<div className={`result-card ${sub[gi]==="correct"?"result-correct":sub[gi]==="wrong"?"result-wrong":"result-skipped"}`}>

<div className="result-body">{sub[gi]!=="skip"&&(<div className="result-compare"><div className="result-col"><label>Your Answer</label><pre>{ans[gi]}</pre></div><div className="result-col"><label>Correct Output</label><pre style={{borderColor:"#166534"}}>{q.output}</pre></div></div>)}
{sub[gi]==="skip"&&(<div className="result-compare" style={{gridTemplateColumns:"1fr"}}><div className="result-col"><label>Correct Output</label><pre>{q.output}</pre></div></div>)}
<div className="explanation"><strong>Why: </strong>{q.why}</div></div></div>
<div style={{textAlign:"center",marginTop:12}}><button onClick={hn} style={{padding:"10px 32px",borderRadius:10,background:"linear-gradient(135deg,#06b6d4,#3b82f6)",color:"#fff",fontWeight:700,fontSize:14,border:"none",boxShadow:"0 0 20px #06b6d420"}}>
{ci<fl.length-1?"Next Question \u2192":PARTS.findIndex(p=>p.key===ap)<PARTS.length-1?"Next Section \u2192":"Finish Assessment \u2192"}</button></div></>)}
<div className="progress-dots">{fl.map((fq,i)=>{const g=questions.indexOf(fq);const s=sub[g];let cls="progress-dot ";if(i===ci)cls+="current";else if(s==="correct")cls+="done-correct";else if(s==="wrong")cls+="done-wrong";else if(s==="skip")cls+="done-skip";else cls+="pending";return <button key={i} className={cls} onClick={()=>{setCi(i);setTp(null);setTt("")}}/>;})}</div>
</div></div>)}
