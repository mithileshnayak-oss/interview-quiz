<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useRef}=React;

const questions=[

// ─── PART A: React + TypeScript (8 Qs) ───────────────────────────────────────

{part:"A",cat:"React + TypeScript",lang:"mcq",diff:"Easy",
code:`// TypeScript generic constraint:
type Props<T extends { id: string }> = {
  items: T[];
  renderItem: (item: T) => React.ReactNode;
};

// Which call would TypeScript REJECT at compile time?

A) <List items={[{id:"1", name:"Alice"}]} renderItem={i => i.name}/>

B) <List items={[{id:"1"}]} renderItem={i => i.id}/>

C) <List items={[{age:30}]} renderItem={i => i.age}/>

D) <List items={[{id:"2", count:5}]} renderItem={i => i.count}/>`,
output:`C) — {age:30} is rejected
T extends { id: string } means every item
MUST have an id: string property.
{age:30} has no id — TypeScript compile error.`,
why:'T extends { id: string } is a generic constraint — every object in items must include an id of type string. A, B, and D all satisfy this: they all have id:"...". C provides {age:30} with no id property, so TypeScript rejects it at compile time with "Property \'id\' is missing in type \'{ age: number }\'".'},

{part:"A",cat:"React + TypeScript",lang:"mcq",diff:"Easy",
code:`// useEffect with a subscription:
useEffect(() => {
  const sub = dataService.subscribe(userId, setData);
  // ← What MUST go here?
}, [userId]);

A) return null;

B) return () => sub.unsubscribe();

C) sub.unsubscribe();

D) // Nothing — React handles cleanup automatically`,
output:`B) return () => sub.unsubscribe();

The cleanup function returned from useEffect
is called when userId changes OR component unmounts.`,
why:'useEffect cleanup functions prevent memory leaks and stale subscriptions. React calls the returned function before running the effect again (when userId changes) and on unmount. Option C calls unsubscribe() immediately — killing the subscription right after it starts. Option A returns null which is invalid. Option D is wrong: React never auto-cleans external subscriptions. This is one of the most common React bugs in production.'},

{part:"A",cat:"React + TypeScript",lang:"mcq",diff:"Medium",
code:`const memoVal  = useMemo(() => expensiveCalc(a, b), [a, b]);
const memoFn   = useCallback(() => doSomething(a), [a]);

// Which statement is MOST correct?

A) useMemo memoizes a function, useCallback memoizes its result

B) useCallback memoizes a function reference, useMemo memoizes
   the return value — they solve different problems

C) They are identical — useMemo(() => fn, d) === useCallback(fn, d)
   always, in every case

D) useCallback only works for event handlers passed as props`,
output:`B) useCallback = stable fn reference
   useMemo = stable computed value

They solve different problems even though
their implementations are similar.`,
why:'useCallback(fn, deps) returns a memoized function — the same function reference as long as deps don\'t change. useMemo(() => compute(), deps) returns a memoized value — the result of running compute(). Practical rule: useCallback for functions passed as props (prevents unnecessary child re-renders), useMemo for expensive calculations. C is technically true at the implementation level but misleads on intent — the React team recommends using the right hook for the right job.'},

{part:"A",cat:"React + TypeScript",lang:"mcq",diff:"Medium",
code:`const UserCard = React.memo(({ user, onEdit }) => (
  <div onClick={() => onEdit(user.id)}>{user.name}</div>
));

// Parent re-renders every second.
// Why does UserCard STILL re-render despite React.memo?

A) React.memo doesn't work with onClick handlers

B) onEdit is a new function reference on every parent render —
   React.memo's shallow comparison sees it as a changed prop

C) user object always causes re-render regardless of memo

D) React.memo only prevents re-renders from state, not parent`,
output:`B) — onEdit is a new function reference every render

Fix: wrap onEdit in useCallback in the parent
so the reference stays stable between renders.`,
why:'React.memo performs a shallow comparison of props. If the parent creates onEdit as an inline arrow function () => handleEdit(id), it\'s a brand-new function object every render — different reference, so React.memo treats it as a changed prop and re-renders. Fix: const onEdit = useCallback((id) => handleEdit(id), [handleEdit]) in the parent. This is one of the most common React.memo "not working" issues developers face.'},

{part:"A",cat:"React + TypeScript",lang:"mcq",diff:"Medium",
code:`// TypeScript discriminated union:
type Result<T> =
  | { status: 'success'; data: T }
  | { status: 'error';   message: string };

function process(result: Result<User>) {
  if (result.status === 'success') {
    console.log(result.data); // ← What does TypeScript know here?
  }
}

A) result.data is unknown — needs explicit type assertion

B) result.data is User — TypeScript narrows the type automatically
   via the discriminant property (status)

C) TypeScript throws an error — data may not exist on all branches

D) result.data is T — you must call process<User>(result) explicitly`,
output:`B) result.data is typed as User
   TypeScript narrows inside the if-block
   using status as the discriminant.`,
why:'Inside the if (result.status === \'success\') block, TypeScript uses the status property as a discriminant to narrow the union type to { status: \'success\'; data: T }. result.data is fully typed as User — no assertion needed. Outside the block, TypeScript still sees the full union and result.data would cause a type error. Discriminated unions are one of TypeScript\'s most powerful features for modeling API responses, state machines, and async results.'},

{part:"A",cat:"React + TypeScript",lang:"mcq",diff:"Hard",
code:`// webpack.config.js — Remote App (Micro Frontend)
new ModuleFederationPlugin({
  name: 'cartApp',
  filename: 'remoteEntry.js',
  exposes: { './Cart': './src/Cart' },
  shared: { react: { singleton: true } }  // ← Why is this critical?
})

// Host App consumes:
const Cart = React.lazy(() => import('cartApp/Cart'));

A) Prevents Cart from rendering more than once on a page

B) Forces all micro-frontends to use the same webpack version

C) Prevents multiple React instances running simultaneously —
   which breaks hooks with "Invalid hook call" errors

D) Prevents CSS conflicts between host and remote apps`,
output:`C) singleton: true ensures ONE React instance
   is shared across all federated modules.

Multiple React instances = broken hooks.
This is the #1 Module Federation gotcha.`,
why:'React hooks rely on an internal singleton state registry. If the host runs React 18.2.0 and the remote bundles its own React 18.1.0, you get TWO React instances — hooks throw "Invalid hook call: Hooks can only be called inside a function component." singleton: true in the shared config tells Module Federation to use only one instance of React, shared across all micro-frontends. This is essential in every MFA setup using Module Federation — Pratham would have encountered this at Xelium.'},

{part:"A",cat:"React + TypeScript",lang:"mcq",diff:"Medium",
code:`// JEST — Testing an async hook:
it('fetches user data', async () => {
  jest.spyOn(global, 'fetch').mockResolvedValue({
    json: () => Promise.resolve({ name: 'Alice', id: 1 })
  });

  const { result } = renderHook(() => useFetchUser('user-1'));

  // ← Which assertion is CORRECT?

A) expect(result.current.data).toBe({ name:'Alice', id:1 });

B) await waitFor(() =>
     expect(result.current.data).toEqual({ name:'Alice', id:1 })
   );

C) setTimeout(() => expect(result.current.data).toBeDefined(), 200);

D) expect(fetch).toHaveBeenCalledWith('/api/user-1');`,
output:`B) await waitFor(() => expect(...).toEqual(...))

waitFor() polls until assertion passes.
toEqual() for deep object comparison (not toBe).`,
why:'Async React state updates must settle before asserting. waitFor() from @testing-library/react retries the assertion until it passes or times out — the correct way to handle async state. toBe() (A) fails: it uses reference equality, and two {name:\'Alice\'} objects are different references. Always use toEqual() for objects. setTimeout (C) is non-deterministic and flaky. D only checks fetch was called but not what data the hook returned. Achieving >90% coverage means writing tests that actually verify behavior — not just that functions were called.'},

{part:"A",cat:"React + TypeScript",lang:"mcq",diff:"Hard",
code:`// ScrollTracker causes 100+ re-renders per second:
function ScrollTracker() {
  const [scrollY, setScrollY] = useState(0);

  useEffect(() => {
    window.addEventListener('scroll',
      () => setScrollY(window.scrollY)
    );
    return () => window.removeEventListener('scroll',
      () => {}  // ← same bug as above?
    );
  }, []);

  return <div>Scroll: {scrollY}</div>;
}

// TWO bugs. Which option correctly identifies BOTH?

A) Missing useCallback + no throttle on setScrollY

B) Cleanup arrow function is a NEW reference (listener never removed)
   + scroll fires setState 60 times/sec (needs rAF or throttle)

C) useEffect deps should include scrollY + missing React.memo

D) addEventListener needs {passive:true} + setState is synchronous`,
output:`B) — Both bugs identified:
1. removeEventListener gets a different fn reference
   → listener NEVER removed → memory leak
2. scroll fires 60fps → excessive re-renders
   → fix: requestAnimationFrame or throttle()`,
why:'Bug 1: addEventListener and removeEventListener must receive the same function reference to pair correctly. () => {} in the cleanup is a different arrow function than the one added — the scroll listener is never removed, causing a memory leak. Fix: store handler in useRef or useCallback. Bug 2: The scroll event fires on every pixel movement (60+ times/second in smooth scroll). Each call triggers setState → re-render. Fix: wrap in requestAnimationFrame(() => setScrollY(window.scrollY)) or use lodash throttle. Both are production-critical issues.'},

// ─── PART B: AEM & Headless CMS (6 Qs) ──────────────────────────────────────

{part:"B",cat:"AEM & Headless CMS",lang:"mcq",diff:"Easy",
code:`Your React SPA needs to display product descriptions
written by content authors. The SAME descriptions are
reused across website, mobile app, and email campaigns.
No layout or presentation logic — just structured data.

Which AEM feature is the CORRECT choice?

A) Experience Fragment — for reusable authored layouts

B) Content Fragment — structured content with no layout,
   delivered headlessly to any channel via GraphQL

C) Page Component — create one AEM page per product

D) Asset Reference — link to binary assets in DAM`,
output:`B) Content Fragment

Pure structured data, no presentation layer.
Delivered via GraphQL to React SPA, mobile, email.
Channel-agnostic = Content Fragment.`,
why:'Content Fragments are channel-agnostic structured content — title, description, price — with no HTML, no layout, no AEM component rendering. They\'re designed exactly for headless delivery via GraphQL to any consumer. Experience Fragments (A) include layout and AEM components and are meant for reusing rendered UI blocks (like a promotional banner). Since the SPA consumes raw data and handles its own presentation, Content Fragments are the right choice — and what Pratham used at Xelium.'},

{part:"B",cat:"AEM & Headless CMS",lang:"mcq",diff:"Medium",
code:`// Your Content Fragment Model is named "BlogPost"
// Fields: title (text), publishedAt (date), tags (text[])

// Which AEM GraphQL query correctly fetches ALL blog posts?

A) query {
     BlogPost { title publishedAt tags }
   }

B) query {
     blogPostList {
       items { title publishedAt tags }
     }
   }

C) query {
     getAllBlogPosts { title publishedAt tags }
   }

D) query {
     fragments(model: "BlogPost") { title publishedAt tags }
   }`,
output:`B) blogPostList { items { ... } }

AEM auto-generates: {ModelName camelCase}List
with an items array containing fragment data.`,
why:'AEM\'s GraphQL schema is auto-generated from Content Fragment Models following the convention: {ModelNameCamelCase}List { items { ...fields } }. "BlogPost" model → "blogPostList" query. The items array contains the actual fragment data. AEM does not use generic getAllX or model parameter patterns — the schema is model-specific. This is the exact syntax Pratham would have used when building GraphQL-powered components at Xelium.'},

{part:"B",cat:"AEM & Headless CMS",lang:"mcq",diff:"Medium",
code:`You updated ONLY the CSS and JS for an AEM site theme
(ui.frontend module). You need to deploy the frontend
changes WITHOUT triggering a full Maven backend build
of Java OSGi bundles (~15 min pipeline).

Which Cloud Manager pipeline type do you use?

A) Full Stack Pipeline — always required for any deployment

B) Web Tier Config Pipeline — for Apache/Dispatcher configs

C) Front-End Pipeline — deploys ui.frontend build artifacts
   to CDN independently of backend

D) Config Pipeline — for environment OSGi configurations`,
output:`C) Front-End Pipeline

Deploys only CSS/JS artifacts from ui.frontend
to the CDN layer. No Maven, no Java bundles.
Introduced by Adobe for rapid UI iteration.`,
why:'AEM Cloud Manager\'s Front-End Pipeline decouples frontend (CSS/JS theme artifacts) from backend (Java OSGi bundles). The ui.frontend module is built by Node.js (npm run build) and the artifact is deployed directly to the CDN layer via this dedicated pipeline — skipping Maven entirely. This enables frontend developers to iterate independently from backend deployments. Full Stack (A) rebuilds everything. Web Tier (B) is only for Apache/Dispatcher config files. Config (D) is for OSGi env-specific configurations.'},

{part:"B",cat:"AEM & Headless CMS",lang:"mcq",diff:"Medium",
code:`Your React SPA calls AEM's GraphQL endpoint.
The security team flags: the endpoint must NOT
accept arbitrary GraphQL queries from the browser
(prevents query injection + enables CDN caching).

What is the CORRECT solution?

A) Add CORS headers to block browser requests entirely

B) Use AEM Persisted Queries — store approved queries server-side,
   expose only a URL like /graphql/execute.json/project/query-name

C) Switch from GraphQL to REST to avoid this entirely

D) Require JWT auth token on every GraphQL request from browser`,
output:`B) AEM Persisted Queries

Queries stored server-side (like stored procedures).

B) TypeScript trusts the cast at compile time but does NO
   runtime validation — if API shape changes, errors are
   silent until runtime. Data is wrong but TypeScript says "fine"

    else cls+="pending";
    return <button key={i} className={cls} onClick={()=>{setCurrentIdx(i);setTyping(null);setTypedText("")}}/>;
  })}
</div>
</div></div>)}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
