<script type="text/babel">
const{useState,useEffect,useRef}=React;
const Q=[
// A: React.js & Frontend (10)
{part:"A",cat:"React.js",lang:"javascript",diff:"Easy",code:`function App() {\n  const [count, setCount] = useState(0);\n  const handleClick = () => {\n    setCount(count + 1);\n    setCount(count + 1);\n  };\n  return <button onClick={handleClick}>{count}</button>;\n  // After one click?\n}`,output:`1 (not 2)`,why:`React batches setState calls. Both see stale count=0. Each sets 0+1=1. Fix: setCount(c => c+1) uses functional updater to chain: 0\u21921\u21922.`},

{part:"A",cat:"React.js",lang:"javascript",diff:"Easy",code:`function App() {\n  const [items, setItems] = useState([]);\n  \n  useEffect(() => {\n    fetch("/api/products")\n      .then(r => r.json())\n      .then(data => setItems(data));\n  }, []);\n\n  console.log("render, items:", items.length);\n  return <p>{items.length} products</p>;\n}\n// Console output on mount:`,output:`"render, items: 0"\n"render, items: 5"  (assuming API returns 5)\n(renders TWICE - initial + after fetch)`,why:`First render: items is [] (length 0). useEffect fires AFTER render, fetches data, calls setItems \u2192 triggers second render with the fetched data. This is the standard fetch-on-mount pattern.`},

{part:"A",cat:"React.js",lang:"javascript",diff:"Medium",code:`function App() {\n  const [count, setCount] = useState(0);\n  \n  useEffect(() => {\n    const timer = setInterval(() => {\n      setCount(count + 1);\n    }, 1000);\n    return () => clearInterval(timer);\n  }, []);\n\n  return <p>{count}</p>;\n}\n// After 5 seconds, what does <p> show?`,output:`1 (stuck at 1, never increments!)`,why:`Stale closure! useEffect runs once (empty deps []), capturing count=0 forever. setCount(0+1) = 1 every second. Fix: setCount(c => c+1) uses the latest state. This is the most common React hook bug.`},

{part:"A",cat:"React.js",lang:"javascript",diff:"Medium",code:`// Redux Toolkit pattern\nconst cartSlice = createSlice({\n  name: "cart",\n  initialState: { items: [], total: 0 },\n  reducers: {\n    addItem: (state, action) => {\n      state.items.push(action.payload);\n      state.total += action.payload.price;\n    },\n    removeItem: (state, action) => {\n      const idx = state.items.findIndex(\n        i => i.id === action.payload\n      );\n      if (idx !== -1) {\n        state.total -= state.items[idx].price;\n        state.items.splice(idx, 1);\n      }\n    }\n  }\n});\n// dispatch(addItem({id:1, name:"Shoe", price:500}))\n// dispatch(addItem({id:2, name:"Hat", price:200}))\n// dispatch(removeItem(1))\n// Final state?`,output:`items: [{id:2, name:"Hat", price:200}]\ntotal: 200`,why:`Redux Toolkit uses Immer internally, so "mutating" state (push, splice) is safe \u2014 it creates an immutable update behind the scenes. Add Shoe(500)+Hat(200)=700. Remove id:1(Shoe): total 700-500=200, items=[Hat]. This is the e-commerce cart pattern from Ujjwal's project.`},

{part:"A",cat:"React.js",lang:"javascript",diff:"Medium",code:`const ProductCard = React.memo(({ product, onAdd }) => {\n  console.log("ProductCard render:", product.name);\n  return (\n    <div>\n      <h3>{product.name}</h3>\n      <button onClick={() => onAdd(product)}>Add</button>\n    </div>\n  );\n});\n\nfunction ProductList({ products }) {\n  const [cart, setCart] = useState([]);\n  const onAdd = (p) => setCart([...cart, p]);\n  \n  return products.map(p =>\n    <ProductCard key={p.id} product={p} onAdd={onAdd} />\n  );\n}\n// 50 products. User adds one to cart.\n// How many ProductCard renders?`,output:`ALL 50 re-render!\nReact.memo fails because onAdd is\nrecreated on every render (new reference).`,why:`onAdd is defined inline \u2014 new function every render. React.memo shallow-compares props: onAdd reference changed \u2192 all ProductCards re-render. Fix: const onAdd = useCallback((p) => setCart(c => [...c, p]), []);  Stable reference + functional updater.`},

{part:"A",cat:"React.js",lang:"javascript",diff:"Hard",code:`function useDebounce(value, delay) {\n  const [debounced, setDebounced] = useState(value);\n  useEffect(() => {\n    const t = setTimeout(() => setDebounced(value), delay);\n    return () => clearTimeout(t);\n  }, [value, delay]);\n  return debounced;\n}\n\nfunction Search() {\n  const [query, setQuery] = useState("");\n  const debouncedQuery = useDebounce(query, 300);\n\n  useEffect(() => {\n    if (debouncedQuery)\n      fetch(\`/api/search?q=\${debouncedQuery}\`);\n  }, [debouncedQuery]);\n\n  // User types "shoe" in 200ms total\n  // How many API calls fire?`,output:`Only 1 API call with query "shoe"\n(after 300ms of no typing)`,why:`Each keystroke ("s","sh","sho","shoe") resets the timer via cleanup (clearTimeout). Only the last timer survives. 300ms after "shoe", debouncedQuery updates to "shoe", triggering one fetch. This prevents 4 API calls for 4 keystrokes \u2014 critical for Ujjwal's e-commerce search.`},

{part:"A",cat:"React.js",lang:"javascript",diff:"Hard",code:`function App() {\n  const [user, setUser] = useState(null);\n  const [loading, setLoading] = useState(true);\n\n  useEffect(() => {\n    const controller = new AbortController();\n    fetch("/api/me", { signal: controller.signal })\n      .then(r => r.json())\n      .then(data => setUser(data))\n      .catch(err => {\n        if (err.name !== "AbortError") console.error(err);\n      })\n      .finally(() => setLoading(false));\n    return () => controller.abort();\n  }, []);\n\n  if (loading) return <Spinner />;\n  if (!user) return <LoginPage />;\n  return <Dashboard user={user} />;\n}\n// Component mounts then immediately unmounts:`,output:`fetch is ABORTED (cancelled).\nNo state update on unmounted component.\nAbortError is silently caught and ignored.`,why:`AbortController cancels the in-flight fetch on cleanup (unmount). Without this, setting state on an unmounted component causes a memory leak warning. The catch filters out AbortError (expected) vs real errors. This is production-grade data fetching.`},

{part:"A",cat:"React.js",lang:"javascript",diff:"Hard",code:`// Stripe payment integration pattern\nfunction Checkout({ cartTotal }) {\n  const [paying, setPaying] = useState(false);\n  const [error, setError] = useState(null);\n\n  const handlePay = async () => {\n    if (paying) return; // prevent double-click\n    setPaying(true);\n    setError(null);\n    try {\n      const { clientSecret } = await fetch("/api/payment", {\n        method: "POST",\n        body: JSON.stringify({ amount: cartTotal })\n      }).then(r => r.json());\n      // ... confirmPayment with Stripe SDK\n    } catch (err) {\n      setError(err.message);\n    } finally {\n      setPaying(false);\n    }\n  };\n}\n// User double-clicks Pay button rapidly:`,output:`Only FIRST click processes.\nSecond click is blocked by\n"if (paying) return" guard.`,why:`The paying flag prevents duplicate payment submissions. First click: setPaying(true) \u2192 API call. Second click: paying is true \u2192 early return. This is critical for payment flows \u2014 without this guard, the user could be charged twice. Ujjwal used Stripe in his e-commerce project.`},

{part:"A",cat:"React.js",lang:"javascript",diff:"Easy",code:`function App() {\n  const [theme, setTheme] = useState("light");\n\n  return (\n    <div className={theme === "dark" ? "bg-black" : "bg-white"}>\n      <button onClick={() =>\n        setTheme(t => t === "light" ? "dark" : "light")\n      }>\n        Toggle: {theme}\n      </button>\n    </div>\n  );\n}\n// After 3 clicks starting from "light":`,output:`Click 1: "dark"\nClick 2: "light"\nClick 3: "dark"`,why:`Functional updater toggles: light\u2192dark\u2192light\u2192dark. The ternary in className reactively switches CSS classes. This is basic theme toggling with Tailwind CSS classes \u2014 common in all of Ujjwal's projects.`},

{part:"A",cat:"React.js",lang:"javascript",diff:"Medium",code:`function App() {\n  const [products, setProducts] = useState([\n    { id: 1, name: "Shoe", price: 500 },\n    { id: 2, name: "Hat", price: 200 },\n    { id: 3, name: "Bag", price: 800 }\n  ]);\n  const [sortBy, setSortBy] = useState("name");\n\n  const sorted = useMemo(() => {\n    console.log("sorting...");\n    return [...products].sort((a, b) =>\n      sortBy === "price" ? a.price - b.price\n        : a.name.localeCompare(b.name)\n    );\n  }, [products, sortBy]);\n\n  // User toggles sort 3 times without\n  // changing products. How many "sorting..." logs?`,output:`3 times (one per sortBy change).\nuseMemo recomputes when deps change.\nIf products also changed, it would recompute too.`,why:`useMemo caches the sorted result. It only recomputes when products or sortBy changes. Without useMemo, sorting would run on EVERY render (even unrelated state changes). For 1000+ products, this avoids expensive re-sorts.`},

// B: Node.js & Backend (6)
{part:"B",cat:"Node.js & Backend",lang:"javascript",diff:"Easy",code:`const express = require("express");\nconst app = express();\n\napp.use((req, res, next) => {\n  console.log(\`\${req.method} \${req.url}\`);\n  next();\n});\n\napp.get("/api/products", (req, res) => {\n  res.json([{ id: 1, name: "Shoe" }]);\n});\n\napp.use((err, req, res, next) => {\n  console.error(err.message);\n  res.status(500).json({ error: "Server error" });\n});\n\n// GET /api/products logs:`,output:`"GET /api/products"\nthen returns [{id:1, name:"Shoe"}]\nError handler is NOT called (no error).`,why:`Middleware executes in order: logging middleware runs first (logs method+url, calls next()), then route handler responds. The error handler (4 params) only runs when next(err) is called or an error is thrown. No error here \u2192 skipped.`},

{part:"B",cat:"Node.js & Backend",lang:"javascript",diff:"Medium",code:`// JWT middleware\nconst jwt = require("jsonwebtoken");\n\nfunction auth(req, res, next) {\n  const token = req.headers.authorization?.split(" ")[1];\n  if (!token) return res.status(401).json({ error: "No token" });\n  try {\n    req.user = jwt.verify(token, process.env.SECRET);\n    next();\n  } catch {\n    res.status(403).json({ error: "Invalid token" });\n  }\n}\n\n// Request with valid token containing:\n// { userId: "123", role: "admin" }\napp.get("/api/admin", auth, (req, res) => {\n  console.log(req.user.role);\n  res.json({ access: true });\n});`,output:`Console: "admin"\nResponse: { access: true }\nHTTP 200`,why:`auth middleware extracts token, jwt.verify decodes and validates it. Decoded payload { userId, role } is attached to req.user. Route handler reads req.user.role = "admin". This is Ujjwal's JWT auth pattern used in StepMint and AI Chat.`},

{part:"B",cat:"Node.js & Backend",lang:"javascript",diff:"Medium",code:`// Socket.IO chat pattern\nconst io = require("socket.io")(server);\n\nio.on("connection", (socket) => {\n  console.log("connected:", socket.id);\n\n  socket.on("join-room", (room) => {\n    socket.join(room);\n    socket.to(room).emit("user-joined", socket.id);\n  });\n\n  socket.on("message", ({ room, text }) => {\n    io.to(room).emit("new-message", {\n      from: socket.id,\n      text\n    });\n  });\n});\n\n// User A joins "general", User B joins "general"\n// User A sends "hello" to "general"\n// Who receives the "new-message" event?`,output:`Both User A AND User B receive it.\nio.to(room) sends to ALL in room\n(including sender).`,why:`socket.to(room) sends to everyone EXCEPT sender. io.to(room) sends to EVERYONE in the room INCLUDING sender. For chat apps, you typically want io.to() so the sender sees their own message appear. Ujjwal used Socket.IO in his AI Chat application.`},

{part:"B",cat:"Node.js & Backend",lang:"javascript",diff:"Hard",code:`// Redis caching middleware\nconst redis = require("redis");\nconst client = redis.createClient();\n\nconst cache = (ttl) => async (req, res, next) => {\n  const key = \`cache:\${req.originalUrl}\`;\n  const cached = await client.get(key);\n  if (cached) {\n    console.log("CACHE HIT");\n    return res.json(JSON.parse(cached));\n  }\n  console.log("CACHE MISS");\n  const originalJson = res.json.bind(res);\n  res.json = (data) => {\n    client.setEx(key, ttl, JSON.stringify(data));\n    originalJson(data);\n  };\n  next();\n};\n\napp.get("/api/products", cache(300), handler);\n// First request then second request:`,output:`Request 1: "CACHE MISS" \u2192 hits DB, stores in Redis\nRequest 2: "CACHE HIT" \u2192 returns from Redis\n(skips DB entirely, 300s TTL)`,why:`Cache middleware intercepts res.json to store the response in Redis before sending it. Next request finds the cached data and returns it immediately. The monkey-patching of res.json is a common Express pattern. Ujjwal claims 40% response time reduction with Redis in his AI Chat app.`},

{part:"B",cat:"Node.js & Backend",lang:"javascript",diff:"Hard",code:`// OpenAI API integration\nconst openai = new OpenAI({ apiKey: process.env.KEY });\n\nasync function chat(messages) {\n  const response = await openai.chat.completions.create({\n    model: "gpt-3.5-turbo",\n    messages: messages,\n    max_tokens: 500,\n    temperature: 0.7\n  });\n  return response.choices[0].message.content;\n}\n\n// What does temperature control?\n// temperature: 0 vs temperature: 1`,output:`temperature: 0 \u2192 deterministic, same input\nalways gives same output (factual/precise)\n\ntemperature: 1 \u2192 more random/creative,\ndifferent outputs each time`,why:`Temperature controls randomness of token selection. 0 = always pick highest probability token (deterministic). 1 = more randomness (creative). For Ujjwal's AI Chat: use lower temp (0.3-0.5) for factual answers, higher (0.7-0.9) for creative conversation.`},

{part:"B",cat:"Node.js & Backend",lang:"javascript",diff:"Hard",code:`// Rate limiter middleware\nconst rateLimit = new Map();\n\nfunction limiter(max, windowMs) {\n  return (req, res, next) => {\n    const ip = req.ip;\n    const now = Date.now();\n    const record = rateLimit.get(ip);\n    \n    if (!record || now > record.reset) {\n      rateLimit.set(ip, { count: 1, reset: now + windowMs });\n      return next();\n    }\n    if (record.count >= max) {\n      return res.status(429).json({ error: "Too many requests" });\n    }\n    record.count++;\n    next();\n  };\n}\n\napp.use(limiter(100, 15 * 60 * 1000));\n// Same IP makes 101 requests in 10 minutes:`,output:`First 100 requests: HTTP 200 (allowed)\nRequest 101: HTTP 429 "Too many requests"\n(blocked until 15-min window resets)`,why:`Rate limiter tracks request count per IP within a time window. After max (100) requests, subsequent requests get 429. Window resets after 15 minutes. Essential for API protection \u2014 prevents abuse of the OpenAI API calls in Ujjwal's AI Chat (each call costs money).`},

// C: MongoDB & Database (4)
{part:"C",cat:"MongoDB",lang:"javascript",diff:"Easy",code:`// MongoDB query\ndb.products.find({\n  price: { $gte: 100, $lte: 500 },\n  category: "electronics"\n}).sort({ price: 1 }).limit(10);`,output:`First 10 electronic products\npriced between 100 and 500,\nsorted by price ascending (cheapest first).`,why:`$gte (>=), $lte (<=) for range queries. Multiple conditions in one object = AND. sort({price: 1}) = ascending. limit(10) = first 10 results. This is the basic product filtering query for Ujjwal's e-commerce platform.`},

{part:"C",cat:"MongoDB",lang:"javascript",diff:"Medium",code:`// MongoDB aggregation\ndb.orders.aggregate([\n  { $match: { status: "completed" } },\n  { $unwind: "$items" },\n  { $group: {\n    _id: "$items.productId",\n    totalSold: { $sum: "$items.quantity" },\n    revenue: { $sum: {\n      $multiply: ["$items.quantity", "$items.price"]\n    }}\n  }},\n  { $sort: { revenue: -1 } },\n  { $limit: 5 }\n]);`,output:`Top 5 best-selling products by revenue.\nEach result shows productId, total quantity\nsold, and total revenue generated.`,why:`$match filters completed orders. $unwind flattens the items array (one doc per item). $group aggregates by product: sums quantities and calculates revenue (qty * price). $sort by revenue descending. $limit 5 for top sellers. This is a real e-commerce analytics query.`},

{part:"C",cat:"MongoDB",lang:"javascript",diff:"Hard",code:`// Mongoose schema + middleware\nconst userSchema = new Schema({\n  email: { type: String, unique: true, required: true },\n  password: { type: String, required: true },\n  steps: { type: Number, default: 0 },\n  tokens: { type: Number, default: 0 }\n});\n\nuserSchema.pre("save", async function(next) {\n  if (this.isModified("password")) {\n    this.password = await bcrypt.hash(this.password, 10);\n  }\n  next();\n});\n\nconst user = new User({ email: "a@b.com", password: "123" });\nawait user.save();\nconsole.log(user.password === "123");`,output:`false\n(password is hashed, not "123" anymore)`,why:`Mongoose pre("save") middleware runs BEFORE saving to DB. isModified("password") ensures hashing only when password changes (not on every save). bcrypt.hash with salt rounds=10 produces a hashed string like "$2b$10$...". The original "123" is gone. This is the StepMint user auth pattern.`},

{part:"C",cat:"MongoDB",lang:"javascript",diff:"Hard",code:`// MongoDB indexing\ndb.products.createIndex({ name: "text", description: "text" });\ndb.products.createIndex({ category: 1, price: -1 });\n\n// Which queries use indexes efficiently?\n// A: db.products.find({ $text: { $search: "shoe" } })\n// B: db.products.find({ category: "clothing" }).sort({ price: -1 })\n// C: db.products.find({ price: { $gt: 100 } })\n// D: db.products.find({ category: "electronics", price: { $lt: 500 } })`,output:`A \u2192 YES (text index on name + description)\nB \u2192 YES (compound index covers category + price)\nC \u2192 NO (price alone, not leftmost prefix)\nD \u2192 YES (compound index covers both fields)`,why:`Text index enables full-text search across name and description. Compound index {category:1, price:-1} works for queries that include category (leftmost prefix rule). Query C only has price \u2014 not the leftmost column, so it can't use the compound index efficiently.`},

// D: JavaScript Core (6)
{part:"D",cat:"JavaScript",lang:"javascript",diff:"Easy",code:`console.log("start");\nsetTimeout(() => console.log("timeout"), 0);\nPromise.resolve().then(() => console.log("promise"));\nconsole.log("end");`,output:`"start"\n"end"\n"promise"\n"timeout"`,why:`Sync code first (start, end). Microtasks (Promise.then) execute before macrotasks (setTimeout). Even 0ms timeout waits for microtask queue. This is the event loop in action.`},

{part:"D",cat:"JavaScript",lang:"javascript",diff:"Easy",code:`const arr = [1, 2, 3, 4, 5];\nconst result = arr\n  .filter(n => n % 2 !== 0)\n  .map(n => n * n)\n  .reduce((sum, n) => sum + n, 0);\n\nconsole.log(result);`,output:`35`,why:`filter odd: [1,3,5]. map square: [1,9,25]. reduce sum: 1+9+25 = 35. Chained array methods are core functional JS \u2014 used constantly in React for data transformation before rendering.`},

{part:"D",cat:"JavaScript",lang:"javascript",diff:"Medium",code:`async function fetchUser() {\n  console.log("1");\n  const res = await fetch("/api/user");\n  console.log("2");\n  return res.json();\n}\n\nconsole.log("A");\nfetchUser().then(() => console.log("B"));\nconsole.log("C");`,output:`"A"\n"1"\n"C"\n"2"\n"B"`,why:`A is sync. fetchUser starts: "1" is sync inside async. await pauses fetchUser, yields control. "C" runs. When fetch resolves: "2". When res.json() resolves: "B" via .then(). This tests async/await execution order understanding.`},

{part:"D",cat:"JavaScript",lang:"javascript",diff:"Medium",code:`const obj = { a: 1, b: { c: 2 } };\nconst copy = { ...obj };\ncopy.a = 99;\ncopy.b.c = 99;\n\nconsole.log(obj.a);\nconsole.log(obj.b.c);`,output:`1\n99`,why:`Spread creates a SHALLOW copy. copy.a = 99 doesn't affect obj.a (primitive, copied by value). But copy.b === obj.b (same reference). So copy.b.c = 99 ALSO changes obj.b.c. Deep copy needed: structuredClone(obj) or JSON.parse(JSON.stringify(obj)).`},

{part:"D",cat:"JavaScript",lang:"javascript",diff:"Hard",code:`for (var i = 0; i < 3; i++) {\n  setTimeout(() => console.log("var:", i), 0);\n}\nfor (let j = 0; j < 3; j++) {\n  setTimeout(() => console.log("let:", j), 0);\n}`,output:`"var: 3"\n"var: 3"\n"var: 3"\n"let: 0"\n"let: 1"\n"let: 2"`,why:`var is function-scoped: all closures share same i (3 after loop ends). let is block-scoped: each iteration creates new j binding, closures capture 0,1,2 separately. Classic closure question.`},

{part:"D",cat:"JavaScript",lang:"javascript",diff:"Hard",code:`class EventEmitter {\n  constructor() { this.events = {}; }\n  on(event, fn) {\n    (this.events[event] ||= []).push(fn);\n  }\n  emit(event, ...args) {\n    (this.events[event] || []).forEach(fn => fn(...args));\n  }\n}\n\nconst ee = new EventEmitter();\nee.on("steps", (count) => console.log("A:", count));\nee.on("steps", (count) => console.log("B:", count * 2));\nee.emit("steps", 5000);`,output:`"A: 5000"\n"B: 10000"`,why:`Custom EventEmitter: on() registers listeners in an array. emit() calls all listeners for that event with the provided args. Both callbacks fire for "steps" event with count=5000. A prints 5000, B prints 5000*2=10000. This pattern powers StepMint's step tracking events.`},

// E: WebSocket & Real-time (4)
{part:"E",cat:"WebSocket & Real-time",lang:"javascript",diff:"Easy",code:`// Client-side Socket.IO\nconst socket = io("http://localhost:3000");\n\nsocket.on("connect", () => {\n  console.log("connected:", socket.id);\n  socket.emit("join", "room-1");\n});\n\nsocket.on("message", (data) => {\n  console.log("received:", data);\n});\n\nsocket.on("disconnect", () => {\n  console.log("disconnected");\n});\n\n// Server sends: io.to("room-1").emit("message", "hello")`,output:`"connected: abc123"\n"received: hello"\n(client joined room-1 and received broadcast)`,why:`Socket.IO client connects, gets unique id. Joins "room-1". Server emits "message" to room-1 \u2192 client's "message" handler fires with "hello". This is the real-time chat pattern from Ujjwal's AI Chat app.`},

{part:"E",cat:"WebSocket & Real-time",lang:"javascript",diff:"Medium",code:`// Reconnection handling\nconst socket = io("http://localhost:3000", {\n  reconnection: true,\n  reconnectionAttempts: 5,\n  reconnectionDelay: 1000\n});\n\nsocket.on("connect", () => console.log("connected"));\nsocket.on("disconnect", (reason) => {\n  console.log("disconnected:", reason);\n  if (reason === "io server disconnect")\n    socket.connect(); // manual reconnect needed\n});\nsocket.on("reconnect_attempt", (n) =>\n  console.log("retry:", n));\nsocket.on("reconnect_failed", () =>\n  console.log("gave up"));\n\n// Server goes down for 3 seconds:`,output:`"disconnected: transport close"\n"retry: 1" (at 1s)\n"retry: 2" (at 2s)\n"retry: 3" (at 3s)\n"connected" (server is back)`,why:`Socket.IO auto-reconnects when server drops (transport close). It retries up to 5 times with 1s delay. After 3s the server is back \u2192 reconnects. "io server disconnect" requires manual socket.connect() because the server intentionally kicked the client. Critical for StepMint with 3 lakh+ users.`},

{part:"E",cat:"WebSocket & Real-time",lang:"javascript",diff:"Hard",code:`// Scaling WebSockets with Redis adapter\nconst { createAdapter } = require("@socket.io/redis-adapter");\nconst pubClient = createClient({ url: "redis://..." });\nconst subClient = pubClient.duplicate();\n\nio.adapter(createAdapter(pubClient, subClient));\n\n// Server 1: user joins "room-A"\n// Server 2: broadcasts to "room-A"\n// Does the user on Server 1 receive it?`,output:`YES \u2014 Redis adapter syncs events\nacross multiple server instances.\nWithout it, only same-server users\nwould receive the broadcast.`,why:`When running multiple Node.js instances (horizontal scaling), each server has its own Socket.IO state. Redis Pub/Sub adapter syncs room membership and events across all instances. Server 2's broadcast to "room-A" goes through Redis \u2192 Server 1 delivers to its local user. Essential for StepMint's 3 lakh+ concurrent users.`},

{part:"E",cat:"WebSocket & Real-time",lang:"javascript",diff:"Hard",code:`// StepMint: Token reward logic\nfunction calculateReward(steps, tier) {\n  const DAILY_TARGET = 10000;\n  if (steps < DAILY_TARGET) return 0;\n\n  const baseReward = 10; // tokens\n  const multiplier = {\n    bronze: 1,\n    silver: 1.5,\n    gold: 2,\n    platinum: 3\n  };\n\n  const bonus = Math.floor((steps - DAILY_TARGET) / 1000) * 2;\n  return (baseReward * (multiplier[tier] || 1)) + bonus;\n}\n\nconsole.log(calculateReward(8000, "gold"));\nconsole.log(calculateReward(10000, "silver"));\nconsole.log(calculateReward(13500, "gold"));`,output:`0\n15\n26`,why:`8000 < 10000 target \u2192 0. 10000 steps, silver: 10 * 1.5 + 0 bonus = 15. 13500 steps, gold: base 10*2=20, bonus floor((13500-10000)/1000)*2 = floor(3.5)*2 = 3*2=6. Total: 20+6=26. This models StepMint's token distribution logic.`},

{!isSub&&(<div className="answer-section"><div className="answer-box"><div className="answer-label">Your Answer</div><textarea ref={ir} className="answer-input" value={iv} onChange={e=>setIv(e.target.value)} placeholder="Type the expected output..." onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey&&iv.trim()){e.preventDefault();hs(false)}}}/><div className="submit-row"><button className="skip-btn" onClick={()=>hs(true)}>Skip {"\u2192"}</button><button className="submit-btn" onClick={()=>hs(false)} disabled={!iv.trim()}>Submit Answer</button></div></div></div>)}
{isSub&&(<><div className="terminal revealed"><div className="terminal-bar"><span>{"\u2b22"} Output</span><span style={{color:"#22c55e"}}>{"\u25cf"} exit(0)</span></div><div className="terminal-body"><div className="terminal-cmd">$ node Q{ci+1}.js</div>{tt.split("\n").map((l,i)=>(<div className="terminal-output" key={i}>{l}</div>))}</div></div>
<div className={`result-card ${su[gi]==="correct"?"result-correct":su[gi]==="wrong"?"result-wrong":"result-skipped"}`}><div className="result-header">{su[gi]==="correct"&&"\u2713 Correct!"}{su[gi]==="wrong"&&"\u2717 Incorrect"}{su[gi]==="skip"&&"\u23ed Skipped"}</div><div className="result-body">{su[gi]!=="skip"&&(<div className="result-compare"><div className="result-col"><label>Your Answer</label><pre>{an[gi]}</pre></div><div className="result-col"><label>Correct Output</label><pre style={{borderColor:"#166534"}}>{q.output}</pre></div></div>)}{su[gi]==="skip"&&(<div className="result-compare" style={{gridTemplateColumns:"1fr"}}><div className="result-col"><label>Correct Output</label><pre>{q.output}</pre></div></div>)}<div className="explanation"><strong>Why: </strong>{q.why}</div></div></div>
<div style={{textAlign:"center",marginTop:12}}><button onClick={hn} style={{padding:"10px 32px",borderRadius:10,background:"linear-gradient(135deg,#10b981,#06b6d4)",color:"#fff",fontWeight:700,fontSize:14,border:"none",boxShadow:"0 0 20px #10b98120"}}>{ci<fl.length-1?"Next Question \u2192":PARTS.findIndex(p=>p.key===ap)<PARTS.length-1?"Next Section \u2192":"Finish Assessment \u2192"}</button></div></>)}
<div className="progress-dots">{fl.map((fq,i)=>{const g=Q.indexOf(fq);const s=su[g];let cls="progress-dot ";if(i===ci)cls+="current";else if(s==="correct")cls+="done-correct";else if(s==="wrong")cls+="done-wrong";else if(s==="skip")cls+="done-skip";else cls+="pending";return <button key={i} className={cls} onClick={()=>{setCi(i);setTp(null);setTt("")}}/>;})}</div></div></div>)}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
